<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Scanner Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        
        #video-container { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            aspect-ratio: 1/1; 
            border: 2px solid #ed2127;
            border-radius: 15px; 
            overflow: hidden; 
            background: #000; 
        }

        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
            /* Digitální zoom - pomůže čočce zaostřit z dálky */
            transform: scale(1.4); 
            transform-origin: center;
        }

        /* Červený zaměřovač */
        .overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 20%;
            border: 2px solid rgba(255, 0, 0, 0.5);
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.4);
            pointer-events: none;
        }

        .controls { margin-top: 25px; width: 100%; max-width: 400px; }
        
        button { 
            width: 100%; padding: 15px; font-size: 18px; cursor: pointer; border: none; 
            border-radius: 10px; background: #ed2127; color: white; font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        button:active { transform: scale(0.98); }
        button:disabled { background: #555; }

        #result { 
            margin-top: 20px; padding: 15px; background: #333; border-radius: 10px; 
            width: 100%; max-width: 400px; text-align: center; box-sizing: border-box;
        }

        #status { font-weight: bold; color: #ffcc00; margin-bottom: 10px; }
        #output-text { font-size: 12px; color: #aaa; font-style: italic; margin-bottom: 10px; overflow-wrap: break-word; }
        
        .map-link { 
            display: block; padding: 15px; background: #4a90e2; color: white; 
            text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px;
        }

        /* Debug canvas - uvidíš, co vidí OCR */
        #debug-canvas { width: 100%; margin-top: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>

    <h2>📍 GPS Text Scanner</h2>
    
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="overlay"></div>
    </div>

    <div class="controls">
        <button id="capture-btn">SKENOVAT TEXT</button>
    </div>

    <div id="result">
        <div id="status">Namiřte na souřadnice</div>
        <div id="output-text">Zde se objeví přečtený text...</div>
        <canvas id="debug-canvas"></canvas>
        <div id="map-button-container"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const debugCanvas = document.getElementById('debug-canvas');
        const captureBtn = document.getElementById('capture-btn');
        const status = document.getElementById('status');
        const outputText = document.getElementById('output-text');
        const mapBtnContainer = document.getElementById('map-button-container');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    } 
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "❌ Chyba kamery: " + err.message;
            }
        }

        async function scanText() {
            const context = canvas.getContext('2d', { willReadFrequently: true });
            
            // Nastavíme canvas na velikost videa
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // 1. Vyfotíme snímek
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 2. Úprava obrazu (Binarizace - černobílý filtr pro lepší čitelnost)
            let imageData = context.getImageData(0, 0, canvas.width, canvas.height);
            let data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                let grayscale = data[i] * 0.3 + data[i+1] * 0.59 + data[i+2] * 0.11;
                let threshold = 130; // Hranice mezi černou a bílou
                let v = (grayscale > threshold) ? 255 : 0;
                data[i] = data[i+1] = data[i+2] = v;
            }
            context.putImageData(imageData, 0, 0);

            // Zobrazíme debug náhled
            debugCanvas.style.display = "block";
            debugCanvas.width = canvas.width;
            debugCanvas.height = canvas.height;
            debugCanvas.getContext('2d').putImageData(imageData, 0, 0);

            captureBtn.disabled = true;
            status.innerText = "⏳ Analyzuji...";
            mapBtnContainer.innerHTML = "";
            
            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                outputText.innerText = "Detekováno: " + text.replace(/\n/g, ' ');
                findCoordinates(text);
            } catch (err) {
                status.innerText = "❌ Chyba OCR.";
            } finally {
                captureBtn.disabled = false;
            }
        }

        function findCoordinates(text) {
            // Regex pro formáty: 50.1234, 14.1234 nebo 50.1234 14.1234
            const regex = /([0-9]{2}\.[0-9]{3,})[^\d]+([0-9]{2}\.[0-9]{3,})/;
            const match = text.match(regex);

            if (match) {
                const lat = match[1];
                const lon = match[2];
                status.innerText = "✅ POLOHA NALEZENA";
                const mapUrl = `https://mapy.cz/zakladni?x=${lon}&y=${lat}&z=15&source=coor&id=${lon}%2C${lat}`;
                mapBtnContainer.innerHTML = `<a href="${mapUrl}" target="_blank" class="map-link">OTEVŘÍT MAPY.CZ</a>`;
            } else {
                status.innerText = "🤔 Zkuste to znovu (ostřeji)";
            }
        }

        captureBtn.addEventListener('click', scanText);
        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
