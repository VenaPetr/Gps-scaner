<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Scanner - Freeze & Crop</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; margin: 0; padding: 10px; }
        
        #viewer-container { 
            position: relative; width: 100%; max-width: 400px; aspect-ratio: 1/1; 
            border: 2px solid #ed2127; border-radius: 15px; overflow: hidden; background: #000;
        }

        video, #freeze-layer { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; 
        }

        #freeze-layer { display: none; z-index: 5; }

        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 20%; border: 2px solid #fff; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); 
            z-index: 10; pointer-events: none;
        }

        .controls { margin-top: 15px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        
        button { 
            width: 100%; padding: 15px; font-size: 16px; cursor: pointer; border: none; 
            border-radius: 10px; background: #ed2127; color: white; font-weight: bold; 
        }
        
        #reset-btn { background: #444; display: none; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #result { 
            margin-top: 15px; padding: 15px; background: #222; border-radius: 10px; 
            width: 100%; max-width: 400px; text-align: center; box-sizing: border-box;
        }

        #output-text { font-size: 12px; color: #888; margin: 5px 0; font-family: monospace; }
        .map-link { display: block; padding: 12px; background: #4a90e2; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        
        .zoom-box { width: 100%; margin: 10px 0; }
        input[type=range] { width: 100%; accent-color: #ed2127; }
    </style>
</head>
<body>

    <div id="viewer-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="freeze-layer"></canvas>
        <div class="overlay" id="target-box"></div>
    </div>

    <div class="zoom-box">
        <input type="range" id="zoom-slider" min="1" max="4" step="0.1" value="1.5">
    </div>

    <div class="controls">
        <button id="capture-btn">SKENOVAT TEXT</button>
        <button id="reset-btn">ZPĚT NA KAMERU</button>
    </div>

    <div id="result">
        <div id="status">Namiřte rámeček na text</div>
        <div id="output-text"></div>
        <div id="map-button-container"></div>
    </div>

    <canvas id="ocr-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const freezeLayer = document.getElementById('freeze-layer');
        const ocrCanvas = document.getElementById('ocr-canvas');
        const captureBtn = document.getElementById('capture-btn');
        const resetBtn = document.getElementById('reset-btn');
        const status = document.getElementById('status');
        const outputText = document.getElementById('output-text');
        const mapBtnContainer = document.getElementById('map-button-container');
        const zoomSlider = document.getElementById('zoom-slider');

        zoomSlider.oninput = () => video.style.transform = `scale(${zoomSlider.value})`;

        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280 } });
            video.srcObject = stream;
        }

        async function scanText() {
            const zoom = zoomSlider.value;
            const vWidth = video.videoWidth;
            const vHeight = video.videoHeight;

            // 1. FREEZE: Zachytíme aktuální pohled na viditelný canvas
            freezeLayer.width = video.clientWidth;
            freezeLayer.height = video.clientHeight;
            freezeLayer.getContext('2d').drawImage(video, 0, 0, freezeLayer.width, freezeLayer.height);
            freezeLayer.style.display = 'block';
            video.style.opacity = '0';
            
            captureBtn.disabled = true;
            resetBtn.style.display = 'block';
            status.innerText = "⏳ Analyzuji výřez...";

            // 2. CROP & PREPROCESS: Vyřízneme jen vnitřek rámečku (overlay)
            const ctx = ocrCanvas.getContext('2d', {willReadFrequently: true});
            
            // Definice výřezu (80% šířka, 20% výška uprostřed)
            const cropW = vWidth / zoom * 0.8;
            const cropH = vHeight / zoom * 0.2;
            const cropX = (vWidth - cropW) / 2;
            const cropY = (vHeight - cropH) / 2;

            ocrCanvas.width = cropW * 2; // Zvětšíme pro lepší detaily
            ocrCanvas.height = cropH * 2;
            ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, ocrCanvas.width, ocrCanvas.height);

            // 3. BINARIZACE: Černobílý filtr pro vysoký kontrast
            let imgData = ctx.getImageData(0, 0, ocrCanvas.width, ocrCanvas.height);
            let d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
                let gray = d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11;
                let v = (gray > 120) ? 255 : 0; // Práh 120 (lze ladit)
                d[i] = d[i+1] = d[i+2] = v;
            }
            ctx.putImageData(imgData, 0, 0);

            // 4. OCR
            try {
                const { data: { text } } = await Tesseract.recognize(ocrCanvas, 'eng', {
                    tessedit_char_whitelist: '0123456789., '
                });
                outputText.innerText = text.trim();
                findCoordinates(text);
            } catch (e) {
                status.innerText = "Chyba při čtení.";
            }
        }

        function findCoordinates(text) {
            const regex = /([0-9]{2}[.,\s][0-9]{3,})/g;
            const matches = text.match(regex);
            if (matches && matches.length >= 2) {
                const lat = matches[0].replace(/[,\s]/, '.');
                const lon = matches[1].replace(/[,\s]/, '.');
                status.innerText = "✅ Nalezeno!";
                mapBtnContainer.innerHTML = `<a href="https://mapy.cz/zakladni?x=${lon}&y=${lat}&z=15&source=coor&id=${lon}%2C${lat}" target="_blank" class="map-link">OTEVŘÍT MAPY.CZ</a>`;
            } else {
                status.innerText = "❓ Souřadnice nenalezeny.";
            }
        }

        resetBtn.onclick = () => {
            freezeLayer.style.display = 'none';
            video.style.opacity = '1';
            resetBtn.style.display = 'none';
            captureBtn.disabled = false;
            status.innerText = "Namiřte rámeček na text";
            mapBtnContainer.innerHTML = "";
            outputText.innerText = "";
        };

        captureBtn.onclick = scanText;
        window.onload = initCamera;
    </script>
</body>
</html>
