<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Location Finder v1.1.5</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; margin: 0; padding: 10px; touch-action: pan-y; }
        .app-header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; padding: 0 5px; }
        .app-title { font-size: 12px; font-weight: bold; color: #ed2127; text-transform: uppercase; letter-spacing: 1px; }
        .app-version { font-size: 10px; color: #666; }

        #viewer-container { position: relative; width: 100%; max-width: 400px; border: 2px solid #ed2127; border-radius: 15px; overflow: hidden; background: #000; }
        video, #freeze-layer { width: 100%; display: block; object-fit: cover; aspect-ratio: 1/1; }
        #freeze-layer { display: none; object-fit: fill; }
        #crop-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: none; touch-action: none; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: 2px solid #00ff00; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); z-index: 10; pointer-events: none; }
        
        .settings-box { width: 100%; max-width: 400px; margin: 10px 0; background: #222; padding: 12px; border-radius: 10px; box-sizing: border-box; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        label { font-size: 11px; color: #888; }
        input[type=range] { width: 65%; accent-color: #ed2127; }

        .map-selector { display: flex; gap: 5px; margin-top: 10px; }
        .map-selector button { flex: 1; padding: 8px; font-size: 10px; background: #333; color: #888; border: 1px solid #444; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .map-selector button.active { background: #444; color: #fff; border-color: #ed2127; }

        .controls { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; }
        button.main-btn { width: 100%; padding: 16px; font-size: 15px; cursor: pointer; border: none; border-radius: 10px; background: #ed2127; color: white; font-weight: bold; }
        #reset-btn { background: #555; display: none; }
        
        .debug-container { margin-top: 10px; padding: 10px; background: #000; border: 1px dashed #444; border-radius: 8px; width: 100%; max-width: 400px; box-sizing: border-box; display: none; }
        #ocr-canvas { width: 100%; height: auto; image-rendering: pixelated; border: 1px solid #00ff00; }

        #result { margin-top: 10px; padding: 12px; background: #111; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; box-sizing: border-box; }
        #output-text { font-size: 15px; color: #00ff00; margin: 8px 0; font-family: monospace; word-break: break-all; background: #000; padding: 5px; }

        #history-list { width: 100%; max-width: 400px; }
        .history-item { display: flex; align-items: center; background: #222; margin-top: 5px; padding: 8px 12px; border-radius: 8px; font-size: 11px; gap: 10px; }
        .history-info { flex-grow: 1; cursor: pointer; display: flex; align-items: center; }
        .order-num { background: #00ff00; color: #000; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; margin-right: 8px; flex-shrink: 0; }
        
        #route-box { width: 100%; max-width: 400px; margin-top: 15px; display: none; background: #1a1a1a; padding: 15px; border-radius: 10px; border: 1px solid #4285F4; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-title">GPS Finder</div>
        <div class="app-version">v1.1.5</div>
    </div>

    <div id="viewer-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="freeze-layer"></canvas>
        <canvas id="crop-canvas"></canvas>
        <div class="overlay" id="main-overlay"></div>
    </div>

    <div class="settings-box">
        <div class="setting-row"><label>Zoom: <span id="zoom-val">1.5</span>x</label><input type="range" id="zoom-slider" min="1" max="8" step="0.1" value="1.5"></div>
        <div class="setting-row"><label>Šířka rámu: <span id="w-val">80</span>%</label><input type="range" id="w-slider" min="10" max="95" value="80"></div>
        <div class="setting-row"><label>Výška rámu: <span id="h-val">15</span>%</label><input type="range" id="h-slider" min="5" max="50" value="15"></div>
        <div class="setting-row"><label>Práh (Binary): <span id="thresh-val">Auto</span></label><input type="range" id="thresh-slider" min="0" max="255" value="128"></div>
        
        <label style="margin-top: 10px; display: block;">VOLBA MAPY:</label>
        <div class="map-selector">
            <button id="m-mcz" class="active" onclick="setMap('mcz')">MAPY.CZ</button>
            <button id="m-gmap" onclick="setMap('gmap')">GOOGLE MAPS</button>
        </div>
    </div>

    <div class="controls">
        <button id="capture-btn" class="main-btn">SKENOVAT KAMEROU</button>
        <button id="file-btn" style="background:#444; border-radius:10px; padding:10px; color:white; border:none; margin-top:5px; cursor:pointer;">FOTKA Z GALERIE</button>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <button id="reset-btn" class="main-btn">ZPĚT KE KAMERĚ</button>
    </div>

    <div id="debug-box" class="debug-container">
        <label style="color: #00ff00; font-size: 9px; display: block; margin-bottom: 5px;">BINÁRNÍ VÝŘEZ PRO OCR:</label>
        <canvas id="ocr-canvas"></canvas>
    </div>

    <div id="result">
        <div id="status" style="font-size: 11px; color: #888;">PŘIPRAVENO</div>
        <div id="output-text">---</div>
    </div>

    <div id="history-list"></div>

    <div id="route-box">
        <div id="distance-info" style="color:#00ff00; font-weight:bold; margin-bottom:10px; text-align:center; font-size: 14px;">Vzdálenost: 0 km</div>
        <button onclick="openRoute()" style="width:100%; padding:15px; background:#4285F4; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">OTEVŘÍT TRASU (GOOGLE MAPS)</button>
    </div>

    <canvas id="raw-crop-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video'), freezeLayer = document.getElementById('freeze-layer'), cropCanvas = document.getElementById('crop-canvas');
        const rawCropCanvas = document.getElementById('raw-crop-canvas'), ocrCanvas = document.getElementById('ocr-canvas'), debugBox = document.getElementById('debug-box');
        const overlay = document.getElementById('main-overlay'), fileInput = document.getElementById('file-input');
        const captureBtn = document.getElementById('capture-btn'), resetBtn = document.getElementById('reset-btn'), statusDisp = document.getElementById('status'), outputText = document.getElementById('output-text');

        let selectedMap = 'mcz', history = JSON.parse(localStorage.getItem('gps_history') || '[]'), selectionOrder = [];
        let isFrozen = false, isGalleryMode = false, sourceImg = null;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                updateOverlay();
                renderHistory();
            } catch (err) { statusDisp.innerText = "CHYBA KAMERY"; }
        }

        function updateOverlay() {
            const w = document.getElementById('w-slider').value;
            const h = document.getElementById('h-slider').value;
            overlay.style.width = w + '%'; overlay.style.height = h + '%';
            document.getElementById('w-val').innerText = w; document.getElementById('h-val').innerText = h;
        }

        function setMap(m) {
            selectedMap = m;
            document.getElementById('m-mcz').classList.toggle('active', m === 'mcz');
            document.getElementById('m-gmap').classList.toggle('active', m === 'gmap');
            renderHistory();
        }

        captureBtn.onclick = async () => {
            if (!video.videoWidth) return;
            isFrozen = true;
            const z = parseFloat(document.getElementById('zoom-slider').value);
            const wPct = document.getElementById('w-slider').value / 100;
            const hPct = document.getElementById('h-slider').value / 100;

            freezeLayer.width = 600; freezeLayer.height = 600;
            freezeLayer.getContext('2d').drawImage(video, 0, 0, 600, 600);
            freezeLayer.style.display = 'block'; video.style.display = 'none';

            const sw = (video.videoWidth / z) * wPct, sh = (video.videoHeight / z) * hPct;
            const sx = (video.videoWidth - sw) / 2, sy = (video.videoHeight - sh) / 2;
            rawCropCanvas.width = sw * 2; rawCropCanvas.height = sh * 2;
            rawCropCanvas.getContext('2d').drawImage(video, sx, sy, sw, sh, 0, 0, rawCropCanvas.width, rawCropCanvas.height);
            
            resetBtn.style.display = 'block'; captureBtn.style.display = 'none';
            processOCR();
        };

        async function processOCR() {
            debugBox.style.display = 'block'; statusDisp.innerText = "⏳ ČTU...";
            const ctx = ocrCanvas.getContext('2d');
            ocrCanvas.width = rawCropCanvas.width; ocrCanvas.height = rawCropCanvas.height;
            let imgData = rawCropCanvas.getContext('2d').getImageData(0, 0, rawCropCanvas.width, rawCropCanvas.height);
            let d = imgData.data, totalB = 0;
            for (let i = 0; i < d.length; i += 4) totalB += (d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11);
            let avgB = totalB / (d.length / 4);
            let thresh = document.getElementById('thresh-slider').value == 128 ? avgB : document.getElementById('thresh-slider').value;
            
            for (let i = 0; i < d.length; i += 4) {
                let v = (d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11 > thresh) ? 255 : 0;
                d[i] = d[i+1] = d[i+2] = v;
            }
            ctx.putImageData(imgData, 0, 0);

            const result = await Tesseract.recognize(ocrCanvas, 'eng');
            const text = result.data.text.trim();
            outputText.innerText = text || "Nenalezeno";
            
            const m = text.match(/([0-9]{2,3}[.,][0-9]{3,})/g);
            if (m && m.length >= 2) {
                const lat = m[0].replace(',', '.'), lon = m[1].replace(',', '.');
                saveToHistory(lat, lon);
                statusDisp.innerText = "✅ OK";
            } else { statusDisp.innerText = "❓ CHYBA SOUŘADNIC"; }
        }

        function saveToHistory(lat, lon) {
            history = history.filter(h => h.lat !== lat);
            history.unshift({ lat, lon, id: Date.now() });
            localStorage.setItem('gps_history', JSON.stringify(history));
            renderHistory();
        }

        function toggleSelect(id) {
            const idx = selectionOrder.indexOf(id);
            if (idx > -1) selectionOrder.splice(idx, 1); else selectionOrder.push(id);
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.length ? '<div style="font-size:10px; color:#666; margin:10px 0">HISTORIE (ZAŠKRTNI PRO TRASU):</div>' : '';
            
            history.forEach(h => {
                const order = selectionOrder.indexOf(h.id);
                const item = document.createElement('div');
                item.className = 'history-item';
                
                const url = selectedMap === 'gmap' 
                    ? `https://www.google.com/maps/search/?api=1&query=${h.lat},${h.lon}` 
                    : `https://mapy.cz/zakladni?x=${h.lon}&y=${h.lat}&z=16&source=coor&id=${h.lon}%2C${h.lat}`;
                
                item.innerHTML = `
                    <input type="checkbox" ${order > -1 ? 'checked' : ''} onclick="toggleSelect(${h.id})">
                    <div class="history-info" onclick="window.open('${url}','_blank')">
                        ${order > -1 ? `<span class="order-num">${order+1}</span>` : ''}
                        <span style="color:#00ff00; font-family:monospace; font-size:12px;">${h.lat}, ${h.lon}</span>
                    </div>
                    <span onclick="deleteItem(${h.id})" style="color:#ed2127; cursor:pointer; font-size:16px;">🗑</span>
                `;
                list.appendChild(item);
            });

            const selPoints = selectionOrder.map(id => history.find(h => h.id === id));
            if (selPoints.length >= 2) {
                document.getElementById('route-box').style.display = 'block';
                let d = 0;
                for(let i=0; i<selPoints.length-1; i++) d += calcDist(selPoints[i], selPoints[i+1]);
                document.getElementById('distance-info').innerText = `Vzdálenost (vzdušná): ${d.toFixed(2)} km`;
            } else { document.getElementById('route-box').style.display = 'none'; }
        }

        function calcDist(p1, p2) {
            const R = 6371, dLat = (p2.lat-p1.lat)*Math.PI/180, dLon = (p2.lon-p1.lon)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function openRoute() {
            const p = selectionOrder.map(id => history.find(h => h.id === id));
            if (p.length < 2) return;
            const origin = `${p[0].lat},${p[0].lon}`;
            const dest = `${p[p.length-1].lat},${p[p.length-1].lon}`;
            let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=driving`;
            if(p.length > 2) {
                const waypoints = p.slice(1,-1).map(x => x.lat + ',' + x.lon).join('|');
                url += `&waypoints=${waypoints}`;
            }
            window.open(url, '_blank');
        }

        function deleteItem(id) {
            history = history.filter(h => h.id !== id);
            selectionOrder = selectionOrder.filter(x => x !== id);
            localStorage.setItem('gps_history', JSON.stringify(history));
            renderHistory();
        }

        document.getElementById('file-btn').onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    sourceImg = img; isFrozen = true; isGalleryMode = true;
                    video.style.display = 'none'; overlay.style.display = 'none';
                    freezeLayer.width = cropCanvas.width = 1000; freezeLayer.height = cropCanvas.height = 1000 * (img.height/img.width);
                    freezeLayer.getContext('2d').drawImage(img, 0, 0, 1000, freezeLayer.height);
                    freezeLayer.style.display = 'block'; cropCanvas.style.display = 'block';
                    resetBtn.style.display = 'block'; captureBtn.style.display = 'none';
                    statusDisp.innerText = "FOTO NAHRÁNO";
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        resetBtn.onclick = () => {
            isFrozen = false; isGalleryMode = false;
            video.style.display = 'block'; freezeLayer.style.display = 'none'; cropCanvas.style.display = 'none';
            overlay.style.display = 'block'; resetBtn.style.display = 'none'; captureBtn.style.display = 'block';
            debugBox.style.display = 'none'; statusDisp.innerText = "PŘIPRAVENO";
        };

        document.getElementById('w-slider').oninput = updateOverlay;
        document.getElementById('h-slider').oninput = updateOverlay;
        document.getElementById('zoom-slider').oninput = (e) => {
            document.getElementById('zoom-val').innerText = e.target.value;
            video.style.transform = `scale(${e.target.value})`;
        };

        window.onload = initCamera;
    </script>
</body>
</html>
