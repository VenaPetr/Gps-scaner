<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Capture v2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; margin: 0; padding: 10px; }
        .app-header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .app-title { font-size: 12px; font-weight: bold; color: #ed2127; text-transform: uppercase; }
        
        #viewer-container { position: relative; width: 100%; max-width: 400px; border: 2px solid #ed2127; border-radius: 15px; overflow: hidden; background: #000; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; }
        #preview-img { max-width: 100%; max-height: 100%; display: none; }
        #crop-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: none; touch-action: none; }

        .controls { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .btn { width: 100%; padding: 16px; font-size: 15px; cursor: pointer; border: none; border-radius: 10px; color: white; font-weight: bold; text-align: center; display: block; box-sizing: border-box; }
        
        /* Hlavní tlačítko je teď dominantní a vždy dostupné */
        #capture-label { background: #ed2127; box-shadow: 0 4px 15px rgba(237, 33, 39, 0.3); }
        #ocr-selection-btn { background: #28a745; display: none; }

        #result { margin-top: 10px; padding: 12px; background: #111; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; }
        #output-text { font-size: 15px; color: #00ff00; margin: 8px 0; font-family: monospace; background: #000; padding: 5px; min-height: 20px; }
        .map-link { display: block; padding: 14px; background: #4a90e2; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        
        #history-list { width: 100%; max-width: 400px; margin-top: 10px; }
        .history-item { display: flex; align-items: center; background: #222; margin-top: 5px; padding: 8px 12px; border-radius: 8px; font-size: 11px; gap: 10px; }
        .delete-btn { color: #ed2127; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-title">GPS Location Finder</div>
        <div style="font-size: 10px; color: #666;">v2.1-fast</div>
    </div>

    <div id="viewer-container">
        <div id="placeholder" style="text-align:center; color:#444;">FOTKA ZDE</div>
        <img id="preview-img">
        <canvas id="crop-canvas"></canvas>
    </div>

    <div class="controls">
        <label for="camera-input" class="btn" id="capture-label">FOTIT / NAHRÁT NOVOU</label>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">
        
        <button id="ocr-selection-btn" class="btn">PŘEČÍST VÝBĚR</button>
    </div>

    <div id="result">
        <div id="status" style="font-size: 12px; color: #888;">PŘIPRAVENO</div>
        <div id="output-text">---</div>
        <div id="map-button-container"></div>
    </div>

    <div id="history-list"></div>
    <canvas id="raw-crop-canvas" style="display:none;"></canvas>

    <script>
        const cameraInput = document.getElementById('camera-input'), previewImg = document.getElementById('preview-img');
        const cropCanvas = document.getElementById('crop-canvas'), rawCropCanvas = document.getElementById('raw-crop-canvas');
        const statusDisp = document.getElementById('status'), outputText = document.getElementById('output-text');
        const mapBtnContainer = document.getElementById('map-button-container'), ocrBtn = document.getElementById('ocr-selection-btn');

        let sourceImg = null, isDrawing = false, startX, startY, selection = { x: 0, y: 0, w: 0, h: 0 };
        let history = JSON.parse(localStorage.getItem('gps_history') || '[]');

        window.onload = renderHistory;

        cameraInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Reset předchozího stavu
            ocrBtn.style.display = 'none';
            mapBtnContainer.innerHTML = "";
            outputText.innerText = "---";

            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    sourceImg = img;
                    document.getElementById('placeholder').style.display = 'none';
                    previewImg.src = ev.target.result;
                    previewImg.style.display = 'block';
                    cropCanvas.style.display = 'block';
                    
                    cropCanvas.width = previewImg.clientWidth;
                    cropCanvas.height = previewImg.clientHeight;
                    statusDisp.innerText = "OZNAČTE TEXT VÝŘEZEM";
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        // Kreslení (Touch i Mouse)
        function getPos(e) {
            const rect = cropCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        cropCanvas.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            isDrawing = true; 
            const p = getPos(e); startX = p.x; startY = p.y; 
        }, {passive: false});

        cropCanvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const p = getPos(e);
            selection = { x: Math.min(startX, p.x), y: Math.min(startY, p.y), w: Math.abs(p.x - startX), h: Math.abs(p.y - startY) };
            const ctx = cropCanvas.getContext('2d');
            ctx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
            ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 3;
            ctx.strokeRect(selection.x, selection.y, selection.w, selection.h);
        }, {passive: false});

        window.addEventListener('touchend', () => { 
            if (isDrawing && selection.w > 10) ocrBtn.style.display = 'block';
            isDrawing = false; 
        });

        ocrBtn.onclick = async () => {
            if (!sourceImg) return;
            statusDisp.innerText = "⏳ ČTU...";
            
            const scaleX = sourceImg.width / previewImg.clientWidth;
            const scaleY = sourceImg.height / previewImg.clientHeight;
            rawCropCanvas.width = selection.w * scaleX;
            rawCropCanvas.height = selection.h * scaleY;
            
            const ctx = rawCropCanvas.getContext('2d');
            ctx.drawImage(sourceImg, selection.x * scaleX, selection.y * scaleY, selection.w * scaleX, selection.h * scaleY, 0, 0, rawCropCanvas.width, rawCropCanvas.height);
            
            try {
                const result = await Tesseract.recognize(rawCropCanvas, 'eng', { 
                    tessedit_char_whitelist: '0123456789.,°\'"NSEWnsewVZvz ' 
                });
                const text = result.data.text.trim();
                outputText.innerText = text || "Nenalezen text";
                parseCoordinates(text);
            } catch (e) { statusDisp.innerText = "CHYBA OCR"; }
        };

        function parseCoordinates(text) {
            const coordRegex = /([NSNSEWnsewVZvz]?\s*\d{1,3}[°\s]+\d{1,2}[.\d]*['\s]*[\d.]*["\s]*[NSNSEWnsewVZvz]?)/gi;
            const matches = text.match(coordRegex);
            let fLat = null, fLon = null;

            if (matches && matches.length >= 2) {
                const c1 = convertToDecimal(matches[0]), c2 = convertToDecimal(matches[1]);
                if (c1.type === 'lon' || c2.type === 'lat') { fLat = c2.val; fLon = c1.val; } 
                else { fLat = c1.val; fLon = c2.val; }
            } else {
                const simpleRegex = /([0-9]{2,3}[.,][0-9]{3,})/g;
                const simpleMatches = text.match(simpleRegex);
                if (simpleMatches && simpleMatches.length >= 2) { fLat = simpleMatches[0].replace(',', '.'); fLon = simpleMatches[1].replace(',', '.'); }
            }

            if (fLat && fLon && !isNaN(fLat)) {
                statusDisp.innerText = "✅ HOTOVO";
                const mapUrl = `https://mapy.cz/zakladni?x=${fLon}&y=${fLat}&z=16&source=coor&id=${fLon}%2C${fLat}`;
                mapBtnContainer.innerHTML = `<a href="${mapUrl}" target="_blank" class="map-link">ZOBRAZIT NA MAPĚ</a>`;
                saveToHistory(fLat, fLon);
            } else { statusDisp.innerText = "❓ NEČITELNÉ"; }
        }

        function convertToDecimal(coordStr) {
            const nums = coordStr.match(/(\d+(\.\d+)?)/g);
            if (!nums) return { val: null, type: 'unknown' };
            let dec = 0;
            if (nums.length === 1) dec = parseFloat(nums[0]);
            else if (nums.length === 2) dec = parseFloat(nums[0]) + (parseFloat(nums[1]) / 60);
            else if (nums.length >= 3) dec = parseFloat(nums[0]) + (parseFloat(nums[1]) / 60) + (parseFloat(nums[2]) / 3600);
            let type = (/[NSns]/.test(coordStr)) ? 'lat' : (/[EWewVZvz]/.test(coordStr) ? 'lon' : 'unknown');
            if (/[SWswZz]/.test(coordStr)) dec = -dec;
            return { val: dec.toFixed(6), type: type };
        }

        function saveToHistory(lat, lon) {
            history = history.filter(h => h.lat !== lat).slice(0, 19);
            history.unshift({ lat, lon });
            localStorage.setItem('gps_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.length ? '<div style="font-size:10px; color:#666; margin-bottom:5px">HISTORIE:</div>' : '';
            history.forEach((h, i) => {
                const item = document.createElement('div'); item.className = 'history-item';
                item.innerHTML = `
                    <div style="flex-grow:1; color:#00ff00; font-weight:bold">${h.lat}, ${h.lon}</div>
                    <a href="https://mapy.cz/zakladni?x=${h.lon}&y=${h.lat}&z=16&source=coor&id=${h.lon}%2C${h.lat}" target="_blank" style="color:#4a90e2; text-decoration:none">MAPA</a>
                    <span class="delete-btn" onclick="deleteItem(${i})">🗑</span>`;
                list.appendChild(item);
            });
        }

        window.deleteItem = (i) => { history.splice(i, 1); localStorage.setItem('gps_history', JSON.stringify(history)); renderHistory(); };
    </script>
</body>
</html>
