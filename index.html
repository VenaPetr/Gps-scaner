<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Scanner - Zoom Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; margin: 0; padding: 20px; }
        
        #video-container { 
            position: relative; width: 100%; max-width: 500px; aspect-ratio: 1/1; 
            border: 2px solid #ed2127; border-radius: 15px; overflow: hidden; background: #000;
        }

        video { 
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.1s ease-out; /* Hladký přechod při zoomování */
        }

        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 20%; border: 2px dashed #fff; box-shadow: 0 0 0 1000px rgba(0,0,0,0.5); pointer-events: none; z-index: 10;
        }

        .zoom-controls { margin-top: 20px; width: 100%; max-width: 500px; text-align: center; }
        
        input[type=range] { width: 80%; height: 15px; cursor: pointer; accent-color: #ed2127; }

        .controls { margin-top: 20px; width: 100%; max-width: 500px; }
        
        button { 
            width: 100%; padding: 20px; font-size: 18px; cursor: pointer; border: none; 
            border-radius: 10px; background: #ed2127; color: white; font-weight: bold; 
        }
        
        button:disabled { background: #444; color: #888; }

        #result { 
            margin-top: 20px; padding: 15px; background: #222; border-radius: 10px; 
            width: 100%; max-width: 500px; text-align: center; box-sizing: border-box;
        }

        #output-text { font-size: 13px; color: #aaa; margin: 10px 0; background: #000; padding: 8px; border-radius: 5px; min-height: 1.5em; word-break: break-all; }
        
        .map-link { display: block; padding: 15px; background: #4a90e2; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        
        .hint { font-size: 12px; color: #888; margin-bottom: 5px; }
    </style>
</head>
<body>

    <h2>📍 GPS Text Scanner</h2>
    
    <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div class="overlay"></div>
    </div>

    <div class="zoom-controls">
        <div class="hint">Přiblížení (Zoom): <span id="zoom-val">1.0</span>x</div>
        <input type="range" id="zoom-slider" min="1" max="4" step="0.1" value="1">
    </div>

    <div class="controls">
        <button id="capture-btn">SKENOVAT TEXT</button>
    </div>

    <div id="result">
        <div id="status">Nastavte zoom a skenujte</div>
        <div id="output-text">Zde se zobrazí syrový text...</div>
        <div id="map-button-container"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const status = document.getElementById('status');
        const outputText = document.getElementById('output-text');
        const mapBtnContainer = document.getElementById('map-button-container');
        const zoomSlider = document.getElementById('zoom-slider');
        const zoomVal = document.getElementById('zoom-val');

        // 1. Ovládání zoomu
        zoomSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            video.style.transform = `scale(${val})`;
            zoomVal.innerText = val;
        });

        // 2. Inicializace kamery
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } } 
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "Chyba kamery. Ujistěte se, že používáte HTTPS.";
            }
        }

        // 3. Skenování
        async function scanText() {
            const context = canvas.getContext('2d');
            
            // Canvas nastavíme na fixní velikost pro optimální OCR
            canvas.width = 1000;
            canvas.height = 1000;

            // Výpočet výřezu podle aktuálního zoomu
            const scale = zoomSlider.value;
            const sw = video.videoWidth / scale;
            const sh = video.videoHeight / scale;
            const sx = (video.videoWidth - sw) / 2;
            const sy = (video.videoHeight - sh) / 2;

            // Nakreslíme pouze to, co uživatel vidí v zaměřovači
            context.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

            captureBtn.disabled = true;
            status.innerText = "⏳ Čtu souřadnice...";
            mapBtnContainer.innerHTML = "";
            
            try {
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_char_whitelist: '0123456789., '
                });
                
                outputText.innerText = "Přečteno: " + text.trim();
                findCoordinates(text);
            } catch (err) {
                status.innerText = "❌ Chyba při analýze";
            } finally {
                captureBtn.disabled = false;
            }
        }

        function findCoordinates(text) {
            const coordPattern = /([0-9]{2}[.,\s][0-9]{3,})/g;
            const matches = text.match(coordPattern);

            if (matches && matches.length >= 2) {
                const lat = matches[0].replace(/[,\s]/, '.');
                const lon = matches[1].replace(/[,\s]/, '.');
                
                status.innerText = "✅ Poloha určena!";
                const mapUrl = `https://mapy.cz/zakladni?x=${lon}&y=${lat}&z=15&source=coor&id=${lon}%2C${lat}`;
                mapBtnContainer.innerHTML = `<a href="${mapUrl}" target="_blank" class="map-link">OTEVŘÍT MAPY.CZ</a>`;
            } else {
                status.innerText = "❓ Zkuste jiný zoom nebo vzdálenost";
            }
        }

        captureBtn.addEventListener('click', scanText);
        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
