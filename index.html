<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Finder Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; margin: 0; padding: 10px; touch-action: none; overflow: hidden; }
        
        /* Header & Info */
        .app-header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .app-title { font-size: 12px; font-weight: bold; color: #ed2127; text-transform: uppercase; }

        /* Hlavní kontejner pro zobrazení */
        #viewer-container { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            aspect-ratio: 1/1;
            border: 2px solid #ed2127; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000; 
            touch-action: none;
        }
        video, #freeze-layer, #crop-canvas { 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: block;
        }
        #freeze-layer { display: none; }
        #crop-canvas { z-index: 20; display: none; }
        
        /* Overlay pro LIVE režim */
        .overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 80%; height: 15%; border: 2px solid #00ff00; 
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); z-index: 10; pointer-events: none; 
        }
        
        /* Ovládací prvky */
        .settings-box { width: 100%; max-width: 400px; margin: 10px 0; background: #222; padding: 10px; border-radius: 10px; box-sizing: border-box; }
        input[type=range] { width: 100%; accent-color: #ed2127; }
        
        .controls { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; }
        button { width: 100%; padding: 14px; font-size: 15px; cursor: pointer; border: none; border-radius: 10px; background: #ed2127; color: white; font-weight: bold; }
        #reset-btn { background: #555; display: none; }
        #ocr-selection-btn { background: #28a745; display: none; }

        #result { margin-top: 10px; padding: 12px; background: #111; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; }
        #output-text { font-size: 15px; color: #00ff00; margin: 8px 0; font-family: monospace; background: #000; padding: 5px; min-height: 20px; }
        
        .map-link { display: block; padding: 14px; background: #4a90e2; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-title">GPS Location Finder v1.1.9</div>
        <div id="zoom-info" style="font-size: 10px; color: #666;">LIVE ZOOM: 1.5x</div>
    </div>

    <div id="viewer-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="freeze-layer"></canvas>
        <canvas id="crop-canvas"></canvas>
        <div class="overlay" id="rect-overlay"></div>
    </div>

    <div class="settings-box">
        <input type="range" id="zoom-slider" min="1" max="8" step="0.1" value="1.5">
        <div style="display:flex; justify-content: space-between; font-size: 10px; color: #888; margin-top: 5px;">
            <span>THRESHOLD</span>
            <span id="threshold-val">Auto</span>
        </div>
        <input type="range" id="threshold-slider" min="0" max="255" value="128">
    </div>

    <div class="controls">
        <button id="capture-btn">SKENOVAT KAMEROU</button>
        <button id="file-btn" style="background:#444">FOTKA Z GALERIE / FOTOAPARÁT</button>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        
        <button id="ocr-selection-btn">PŘEČÍST VÝBĚR</button>
        <button id="reset-btn">ZPĚT KE KAMERĚ</button>
    </div>

    <div id="result">
        <div id="status" style="font-size: 12px; color: #888;">PŘIPRAVENO</div>
        <div id="output-text">---</div>
        <div id="map-button-container"></div>
    </div>

    <canvas id="raw-crop-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video'), freezeLayer = document.getElementById('freeze-layer'), cropCanvas = document.getElementById('crop-canvas');
        const fileInput = document.getElementById('file-input'), captureBtn = document.getElementById('capture-btn'), fileBtn = document.getElementById('file-btn');
        const resetBtn = document.getElementById('reset-btn'), ocrSelectionBtn = document.getElementById('ocr-selection-btn');
        const statusDisp = document.getElementById('status'), outputText = document.getElementById('output-text'), mapBtnContainer = document.getElementById('map-button-container');
        const zoomSlider = document.getElementById('zoom-slider'), thresholdSlider = document.getElementById('threshold-slider');

        let videoTrack = null, isFrozen = false, sourceImg = null;
        
        // Logika ořezového rámečku (relativní souřadnice 0-1)
        let cropRect = { x: 0.1, y: 0.4, w: 0.8, h: 0.15 };
        let activeHandle = null; // Kterou část rámečku držíme

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
                video.srcObject = stream; videoTrack = stream.getVideoTracks()[0];
                applyZoom();
            } catch (err) { statusDisp.innerText = "CHYBA KAMERY"; }
        }

        // --- MANIPULACE S RÁMEČKEM ---
        function drawCropTool() {
            const ctx = cropCanvas.getContext('2d');
            ctx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
            
            const x = cropRect.x * cropCanvas.width;
            const y = cropRect.y * cropCanvas.height;
            const w = cropRect.w * cropCanvas.width;
            const h = cropRect.h * cropCanvas.height;

            // Ztmavení okolí
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0,0, cropCanvas.width, y); // nahoře
            ctx.fillRect(0, y+h, cropCanvas.width, cropCanvas.height - (y+h)); // dole
            ctx.fillRect(0, y, x, h); // vlevo
            ctx.fillRect(x+w, y, cropCanvas.width - (x+w), h); // vpravo

            // Zelený rámeček
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, w, h);

            // Úchyty (Handles)
            ctx.fillStyle = "#00ff00";
            const handleSize = 15;
            ctx.fillRect(x - handleSize, y - handleSize, handleSize*2, handleSize*2); // levý horní
            ctx.fillRect(x + w - handleSize, y + h - handleSize, handleSize*2, handleSize*2); // pravý dolní
        }

        function getTouchPos(e) {
            const rect = cropCanvas.getBoundingClientRect();
            const touch = e.touches ? e.touches[0] : e;
            return {
                x: (touch.clientX - rect.left) / rect.width,
                y: (touch.clientY - rect.top) / rect.height
            };
        }

        cropCanvas.addEventListener('touchstart', (e) => {
            const pos = getTouchPos(e);
            const margin = 0.05;
            // Detekce rohů
            if (Math.abs(pos.x - cropRect.x) < margin && Math.abs(pos.y - cropRect.y) < margin) activeHandle = 'tl';
            else if (Math.abs(pos.x - (cropRect.x + cropRect.w)) < margin && Math.abs(pos.y - (cropRect.y + cropRect.h)) < margin) activeHandle = 'br';
            // Detekce vnitřku (posun celého rámečku)
            else if (pos.x > cropRect.x && pos.x < cropRect.x + cropRect.w && pos.y > cropRect.y && pos.y < cropRect.y + cropRect.h) activeHandle = 'move';
        });

        cropCanvas.addEventListener('touchmove', (e) => {
            if (!activeHandle) return;
            e.preventDefault();
            const pos = getTouchPos(e);

            if (activeHandle === 'tl') {
                const dw = cropRect.x - pos.x;
                const dh = cropRect.y - pos.y;
                cropRect.x = pos.x; cropRect.y = pos.y;
                cropRect.w += dw; cropRect.h += dh;
            } else if (activeHandle === 'br') {
                cropRect.w = pos.x - cropRect.x;
                cropRect.h = pos.y - cropRect.y;
            }
            drawCropTool();
        });

        window.addEventListener('touchend', () => activeHandle = null);

        // --- LOGIKA SKENOVÁNÍ ---
        fileBtn.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    sourceImg = img; isFrozen = true;
                    video.style.display = 'none'; document.getElementById('rect-overlay').style.display = 'none';
                    freezeLayer.width = 1000; freezeLayer.height = 1000 * (img.height/img.width);
                    freezeLayer.getContext('2d').drawImage(img, 0, 0, freezeLayer.width, freezeLayer.height);
                    freezeLayer.style.display = 'block';
                    cropCanvas.style.display = 'block'; cropCanvas.width = 1000; cropCanvas.height = 1000 * (img.height/img.width);
                    drawCropTool();
                    resetBtn.style.display = 'block'; ocrSelectionBtn.style.display = 'block';
                    captureBtn.style.display = 'none'; fileBtn.style.display = 'none';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        ocrSelectionBtn.onclick = async () => {
            if (!sourceImg) return;
            statusDisp.innerText = "⏳ ČTU VÝBĚR...";
            const rawCtx = document.getElementById('raw-crop-canvas').getContext('2d');
            const sw = cropRect.w * sourceImg.width;
            const sh = cropRect.h * sourceImg.height;
            const sx = cropRect.x * sourceImg.width;
            const sy = cropRect.y * sourceImg.height;

            document.getElementById('raw-crop-canvas').width = sw;
            document.getElementById('raw-crop-canvas').height = sh;
            rawCtx.drawImage(sourceImg, sx, sy, sw, sh, 0, 0, sw, sh);

            // OCR proces (zjednodušeno pro ukázku)
            const result = await Tesseract.recognize(document.getElementById('raw-crop-canvas'), 'eng');
            outputText.innerText = result.data.text.trim();
            statusDisp.innerText = "HOTOVO";
        };

        captureBtn.onclick = () => {
            // Live sken využije stávající overlay a zoom
            statusDisp.innerText = "SKENUJI...";
            // ... (zde zůstává původní logika live skenu)
        };

        resetBtn.onclick = () => {
            location.reload(); // Pro v1.1.9 nejčistší reset stavu
        };

        function applyZoom() {
            const val = zoomSlider.value;
            video.style.transform = `scale(${val})`;
            document.getElementById('zoom-info').innerText = `LIVE ZOOM: ${val}x`;
        }
        zoomSlider.oninput = applyZoom;

        window.onload = initCamera;
    </script>
</body>
</html>
