<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Scanner - Clear View</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; }
        #video-container { 
            position: relative; 
            width: 100%; 
            max-width: 500px; 
            aspect-ratio: 4/3; 
            border: 2px solid #ed2127;
            border-radius: 15px; 
            overflow: hidden; 
            background: #000;
        }
        video { 
            width: 100%; 
            height: 100%; 
            object-fit: cover;
        }
        .overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; height: 15%;
            border: 2px dashed rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .controls { margin-top: 20px; width: 100%; max-width: 500px; }
        button { 
            width: 100%; padding: 18px; font-size: 18px; cursor: pointer; border: none; 
            border-radius: 10px; background: #ed2127; color: white; font-weight: bold; 
        }
        button:disabled { background: #555; }
        #result { 
            margin-top: 20px; padding: 15px; background: #333; border-radius: 10px; 
            width: 100%; max-width: 500px; text-align: center; box-sizing: border-box;
        }
        #output-text { font-size: 14px; color: #ccc; margin: 10px 0; min-height: 20px; }
        .map-link { 
            display: block; padding: 15px; background: #4a90e2; color: white; 
            text-decoration: none; border-radius: 8px; font-weight: bold; 
        }
        #info { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>📍 GPS Text Scanner</h2>
    
    <p id="info">Tip: Klikněte na obraz pro pokus o přeostření.</p>

    <div id="video-container" onclick="initCamera()">
        <video id="video" autoplay playsinline></video>
        <div class="overlay"></div>
    </div>

    <div class="controls">
        <button id="capture-btn">SKENOVAT</button>
    </div>

    <div id="result">
        <div id="status">Připraveno</div>
        <div id="output-text"></div>
        <div id="map-button-container"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const status = document.getElementById('status');
        const outputText = document.getElementById('output-text');
        const mapBtnContainer = document.getElementById('map-button-container');

        async function initCamera() {
            // Pokud už stream běží, zkusíme ho zastavit pro reset ostření
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            try {
                const constraints = { 
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        // Pokročilé ostření (podporováno jen některými prohlížeči)
                        advanced: [{ focusMode: "continuous" }]
                    } 
                };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                status.innerText = "Kamera připravena";
            } catch (err) {
                status.innerText = "Chyba kamery. Zkuste HTTPS.";
            }
        }

        async function scanText() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Vyfotíme čistý barevný snímek
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            captureBtn.disabled = true;
            status.innerText = "⏳ Čtu text...";
            mapBtnContainer.innerHTML = "";
            
            try {
                // Tesseract analýza (angličtina je pro čísla nejlepší)
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
                
                // Vyčištění textu pro zobrazení
                const cleanText = text.replace(/\s+/g, ' ').trim();
                outputText.innerText = "Text: " + (cleanText || "Nic nenalezeno");
                
                findCoordinates(cleanText);
            } catch (err) {
                status.innerText = "❌ Chyba při analýze";
            } finally {
                captureBtn.disabled = false;
            }
        }

        function findCoordinates(text) {
            // Regex hledá dvě skupiny čísel s tečkou (např. 50.123 14.456)
            const regex = /([0-9]{2}\.[0-9]{3,})[^\d]+([0-9]{2,3}\.[0-9]{3,})/;
            const match = text.match(regex);

            if (match) {
                const lat = match[1];
                const lon = match[2];
                status.innerText = "✅ Souřadnice rozpoznány";
                
                const mapUrl = `https://mapy.cz/zakladni?x=${lon}&y=${lat}&z=15&source=coor&id=${lon}%2C${lat}`;
                mapBtnContainer.innerHTML = `<a href="${mapUrl}" target="_blank" class="map-link">OTEVŘÍT MAPY.CZ</a>`;
            } else {
                status.innerText = "❓ Souřadnice nenalezeny";
            }
        }

        captureBtn.addEventListener('click', scanText);
        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
