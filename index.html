<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Location Finder Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; margin: 0; padding: 10px; touch-action: pan-y; }
        
        .app-header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; padding: 0 5px; }
        .app-title { font-size: 12px; font-weight: bold; color: #ed2127; text-transform: uppercase; letter-spacing: 1px; }
        .app-version { font-size: 10px; color: #666; }

        #viewer-container { 
            position: relative; 
            width: 100%; 
            max-width: 400px; 
            border: 2px solid #ed2127; 
            border-radius: 15px; 
            overflow: hidden; 
            background: #000;
            aspect-ratio: 1 / 1;
        }
        
        video { 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
        }

        #freeze-layer { 
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none; 
            object-fit: contain; 
            z-index: 5;
        }

        #crop-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: none; touch-action: none; }
        
        /* Dynamický zelený rámeček */
        .overlay { 
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 85%; height: 12%; /* Výchozí hodnoty */
            border: 2px solid #00ff00; 
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); 
            z-index: 10; 
            pointer-events: none; 
        }
        
        .settings-box { width: 100%; max-width: 400px; margin: 10px 0; background: #222; padding: 10px; border-radius: 10px; box-sizing: border-box; }
        .settings-row { display: flex; gap: 10px; align-items: center; margin-bottom: 5px; }
        .settings-row > div { flex: 1; }
        label { font-size: 10px; color: #888; display: block; margin-bottom: 2px; }
        input[type=range] { width: 100%; accent-color: #ed2127; margin-bottom: 5px; }
        
        .controls { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; }
        button { width: 100%; padding: 16px; font-size: 15px; cursor: pointer; border: none; border-radius: 10px; background: #ed2127; color: white; font-weight: bold; }
        
        .debug-container { margin-top: 10px; padding: 10px; background: #000; border: 1px dashed #444; border-radius: 8px; width: 100%; max-width: 400px; box-sizing: border-box; display: none; }
        #ocr-canvas { width: 100%; height: auto; image-rendering: pixelated; border: 1px solid #00ff00; }

        #result { margin-top: 10px; padding: 12px; background: #111; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; box-sizing: border-box; }
        #output-text { font-size: 15px; color: #00ff00; margin: 8px 0; font-family: monospace; word-break: break-all; background: #000; padding: 5px; min-height: 20px; }
        
        .map-link { display: block; padding: 14px; background: #4a90e2; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        #history-list { width: 100%; max-width: 400px; margin-top: 10px; margin-bottom: 30px; }
        .history-item { display: flex; align-items: center; background: #222; margin-top: 5px; padding: 8px 12px; border-radius: 8px; font-size: 11px; gap: 10px; }
        .history-info { flex-grow: 1; display: flex; flex-direction: column; }
        .delete-btn { color: #ed2127; cursor: pointer; font-size: 18px; padding: 2px 5px; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-title">GPS Location Finder</div>
        <div class="app-version">v1.2.0-resizable</div>
    </div>

    <div id="viewer-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="freeze-layer"></canvas>
        <canvas id="crop-canvas"></canvas>
        <div class="overlay" id="rect-overlay"></div>
    </div>

    <div class="settings-box">
        <div class="settings-row">
            <div>
                <label>Zoom: <span id="zoom-val">1.0</span>x</label>
                <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
            </div>
            <div>
                <label>Threshold: <span id="threshold-val">Auto</span></label>
                <input type="range" id="threshold-slider" min="0" max="255" step="1" value="128">
            </div>
        </div>
        <div class="settings-row">
            <div>
                <label>Šířka rámečku: <span id="w-val">85</span>%</label>
                <input type="range" id="width-slider" min="10" max="95" step="1" value="85">
            </div>
            <div>
                <label>Výška rámečku: <span id="h-val">12</span>%</label>
                <input type="range" id="height-slider" min="5" max="50" step="1" value="12">
            </div>
        </div>
    </div>

    <div class="controls">
        <button id="capture-btn">📸 SKENOVAT OBLAST</button>
        <button id="file-btn" style="background:#444">🖼️ GALERIE</button>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <button id="ocr-selection-btn">🔍 PŘEČÍST VÝBĚR</button>
        <button id="reset-btn">🔄 ZPĚT KE KAMERĚ</button>
    </div>

    <div id="debug-box" class="debug-container">
        <canvas id="ocr-canvas"></canvas>
    </div>

    <div id="result">
        <div id="status" style="font-size: 12px; color: #888;">PŘIPRAVENO</div>
        <div id="output-text">---</div>
        <div id="map-button-container"></div>
    </div>

    <div id="history-list"></div>
    <canvas id="raw-crop-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video'), 
              freezeLayer = document.getElementById('freeze-layer'), 
              cropCanvas = document.getElementById('crop-canvas'),
              rawCropCanvas = document.getElementById('raw-crop-canvas'), 
              ocrCanvas = document.getElementById('ocr-canvas'), 
              debugBox = document.getElementById('debug-box'),
              rectOverlay = document.getElementById('rect-overlay'),
              captureBtn = document.getElementById('capture-btn'), 
              resetBtn = document.getElementById('reset-btn'),
              statusDisp = document.getElementById('status'), 
              outputText = document.getElementById('output-text'), 
              mapBtnContainer = document.getElementById('map-button-container');

        const wSlider = document.getElementById('width-slider'),
              hSlider = document.getElementById('height-slider'),
              zSlider = document.getElementById('zoom-slider');

        let videoTrack = null, isFrozen = false, isGalleryMode = false, sourceImg = null;
        let history = JSON.parse(localStorage.getItem('gps_history') || '[]');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream; 
                videoTrack = stream.getVideoTracks()[0];
                renderHistory();
            } catch (err) { statusDisp.innerText = "CHYBA KAMERY"; }
        }

        // Aktualizace velikosti rámečku v reálném čase
        function updateOverlay() {
            rectOverlay.style.width = wSlider.value + '%';
            rectOverlay.style.height = hSlider.value + '%';
            document.getElementById('w-val').innerText = wSlider.value;
            document.getElementById('h-val').innerText = hSlider.value;
        }

        wSlider.oninput = updateOverlay;
        hSlider.oninput = updateOverlay;

        captureBtn.onclick = async () => {
            if (!video.videoWidth) return;
            isFrozen = true;
            
            // Zmrazení
            freezeLayer.width = video.videoWidth;
            freezeLayer.height = video.videoHeight;
            freezeLayer.getContext('2d').drawImage(video, 0, 0);
            freezeLayer.style.display = 'block'; 
            video.style.display = 'none';

            // Výpočet výřezu na základě aktuálních sliderů
            const realW = video.videoWidth;
            const realH = video.videoHeight;
            
            const percW = parseInt(wSlider.value) / 100;
            const percH = parseInt(hSlider.value) / 100;

            const sw = realW * percW; 
            const sh = realH * percH;
            const sx = (realW - sw) / 2;
            const sy = (realH - sh) / 2;

            rawCropCanvas.width = sw * 2; 
            rawCropCanvas.height = sh * 2;
            const ctx = rawCropCanvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(video, sx, sy, sw, sh, 0, 0, rawCropCanvas.width, rawCropCanvas.height);

            resetBtn.style.display = 'block'; 
            captureBtn.style.display = 'none';
            processImageAndOCR();
        };

        async function processImageAndOCR() {
            debugBox.style.display = 'block'; statusDisp.innerText = "⏳ ANALÝZA...";
            const ocrCtx = ocrCanvas.getContext('2d');
            ocrCanvas.width = rawCropCanvas.width; ocrCanvas.height = rawCropCanvas.height;
            
            let imgData = rawCropCanvas.getContext('2d').getImageData(0, 0, rawCropCanvas.width, rawCropCanvas.height);
            let d = imgData.data, totalB = 0;
            for (let i = 0; i < d.length; i += 4) totalB += (d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11);
            let avgB = totalB / (d.length / 4);
            
            let threshSlider = document.getElementById('threshold-slider');
            let thresh = (threshSlider.value == 128) ? avgB : threshSlider.value;
            
            for (let i = 0; i < d.length; i += 4) { 
                let v = (d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11 > thresh) ? 255 : 0; 
                d[i] = d[i+1] = d[i+2] = v; 
            }
            ocrCtx.putImageData(imgData, 0, 0);

            try {
                const result = await Tesseract.recognize(ocrCanvas, 'eng+ces', { 
                    tessedit_char_whitelist: '0123456789.,°\'"NSEWnsewVZvz ' 
                });
                const text = result.data.text.trim();
                outputText.innerText = text || "Text nenalezen";
                parseCoordinates(text);
            } catch (e) { statusDisp.innerText = "CHYBA OCR"; }
        }

        // ... (Zbytek funkcí parseCoordinates, convertToDecimal, displayResult, saveToHistory zůstává stejný jako v předchozí verzi)

        function parseCoordinates(text) {
            const coordRegex = /([NSNSEWnsewVZvz]?\s*\d{1,3}[°\s]+\d{1,2}[.\d]*['\s]*[\d.]*["\s]*[NSNSEWnsewVZvz]?)/gi;
            const matches = text.match(coordRegex);
            let fLat = null, fLon = null;
            if (matches && matches.length >= 2) {
                const c1 = convertToDecimal(matches[0]), c2 = convertToDecimal(matches[1]);
                if (c1.type === 'lon' || c2.type === 'lat') { fLat = c2.val; fLon = c1.val; } 
                else { fLat = c1.val; fLon = c2.val; }
            } else {
                const simpleRegex = /([0-9]{2,3}[.,][0-9]{3,})/g;
                const simpleMatches = text.match(simpleRegex);
                if (simpleMatches && simpleMatches.length >= 2) { fLat = simpleMatches[0].replace(',', '.'); fLon = simpleMatches[1].replace(',', '.'); }
            }
            if (fLat && fLon) displayResult(fLat, fLon, "✅ OK");
            else statusDisp.innerText = "❓ NEROZPOZNÁNO";
        }

        function convertToDecimal(coordStr) {
            const nums = coordStr.match(/(\d+(\.\d+)?)/g);
            if (!nums) return { val: null, type: 'unknown' };
            let decimal = 0;
            if (nums.length === 1) decimal = parseFloat(nums[0]);
            else if (nums.length === 2) decimal = parseFloat(nums[0]) + (parseFloat(nums[1]) / 60);
            else if (nums.length >= 3) decimal = parseFloat(nums[0]) + (parseFloat(nums[1]) / 60) + (parseFloat(nums[2]) / 3600);
            let type = 'unknown';
            if (/[NSns]/.test(coordStr)) type = 'lat';
            if (/[EWewVZvz]/.test(coordStr)) type = 'lon';
            if (/[SWswZz]/.test(coordStr)) decimal = -decimal;
            return { val: decimal.toFixed(6), type: type };
        }

        function displayResult(lat, lon, msg) {
            statusDisp.innerText = msg;
            const mapUrl = `https://mapy.cz/zakladni?x=${lon}&y=${lat}&z=16&source=coor&id=${lon}%2C${lat}`;
            mapBtnContainer.innerHTML = `<a href="${mapUrl}" target="_blank" class="map-link">📍 MAPY.CZ</a>`;
            saveToHistory(lat, lon);
        }

        function saveToHistory(lat, lon) {
            history = history.filter(h => h.lat !== lat); history.unshift({ lat, lon }); 
            if (history.length > 20) history.pop();
            localStorage.setItem('gps_history', JSON.stringify(history)); renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.length ? '<div style="font-size:10px; color:#666; margin:10px 0 5px 0">HISTORIE:</div>' : '';
            history.forEach((h, index) => {
                const item = document.createElement('div'); item.className = 'history-item';
                item.innerHTML = `<div class="history-info"><b>${h.lat}, ${h.lon}</b></div><a href="https://mapy.cz/zakladni?x=${h.lon}&y=${h.lat}&z=16&source=coor&id=${h.lon}%2C${h.lat}" target="_blank" style="color:#4a90e2; text-decoration:none; font-size:10px">MAPA</a>`;
                list.appendChild(item);
            });
        }

        resetBtn.onclick = () => {
            isFrozen = false; video.style.display = 'block'; freezeLayer.style.display = 'none';
            resetBtn.style.display = 'none'; captureBtn.style.display = 'block'; debugBox.style.display = 'none';
            statusDisp.innerText = "PŘIPRAVENO"; outputText.innerText = "---"; mapBtnContainer.innerHTML = "";
        };

        zSlider.oninput = () => {
            video.style.transform = `translate(-50%, -50%) scale(${zSlider.value})`;
            document.getElementById('zoom-val').innerText = zSlider.value;
        };

        window.onload = initCamera;
    </script>
</body>
</html>
