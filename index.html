<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Scanner - Monitor Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; margin: 0; padding: 20px; }
        #video-container { 
            position: relative; width: 100%; max-width: 500px; aspect-ratio: 4/3; 
            border: 2px solid #ed2127; border-radius: 15px; overflow: hidden; background: #000;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 20%; border: 2px dashed #fff; box-shadow: 0 0 0 1000px rgba(0,0,0,0.4); pointer-events: none;
        }
        .controls { margin-top: 20px; width: 100%; max-width: 500px; }
        button { 
            width: 100%; padding: 20px; font-size: 18px; cursor: pointer; border: none; 
            border-radius: 10px; background: #ed2127; color: white; font-weight: bold; 
        }
        button:disabled { background: #444; color: #888; }
        #result { 
            margin-top: 20px; padding: 15px; background: #222; border-radius: 10px; 
            width: 100%; max-width: 500px; text-align: center; box-sizing: border-box;
        }
        #output-text { font-size: 14px; color: #aaa; margin: 10px 0; background: #000; padding: 5px; border-radius: 5px; min-height: 1.5em; }
        .map-link { display: block; padding: 15px; background: #4a90e2; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        .hint { font-size: 12px; color: #888; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

    <h2>📍 GPS Text Scanner</h2>
    <p class="hint">Držte mobil 30-40 cm od monitoru. <br>Klikněte na obraz pro přeostření.</p>

    <div id="video-container" onclick="initCamera()">
        <video id="video" autoplay playsinline></video>
        <div class="overlay"></div>
    </div>

    <div class="controls">
        <button id="capture-btn">SKENOVAT</button>
    </div>

    <div id="result">
        <div id="status">Připraveno</div>
        <div id="output-text">Zde se zobrazí syrový text...</div>
        <div id="map-button-container"></div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('capture-btn');
        const status = document.getElementById('status');
        const outputText = document.getElementById('output-text');
        const mapBtnContainer = document.getElementById('map-button-container');

        async function initCamera() {
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } } 
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "Chyba kamery. Ujistěte se, že používáte HTTPS.";
            }
        }

        async function scanText() {
            const context = canvas.getContext('2d');
            
            // Zmenšení pro vyhlazení rastru monitoru
            canvas.width = 800;
            canvas.height = (video.videoHeight / video.videoWidth) * 800;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            captureBtn.disabled = true;
            status.innerText = "⏳ Čtu (zkuste držet mobil dál)...";
            mapBtnContainer.innerHTML = "";
            
            try {
                // Konfigurace: pouze čísla a oddělovače
                const { data: { text } } = await Tesseract.recognize(canvas, 'eng', {
                    tessedit_char_whitelist: '0123456789., '
                });
                
                outputText.innerText = "Přečteno: " + text.trim();
                findCoordinates(text);
            } catch (err) {
                status.innerText = "❌ Chyba při analýze";
            } finally {
                captureBtn.disabled = false;
            }
        }

        function findCoordinates(text) {
            // Hledá dvě skupiny čísel (šířka, délka) s tečkou/čárkou/mezerou
            const coordPattern = /([0-9]{2}[.,\s][0-9]{3,})/g;
            const matches = text.match(coordPattern);

            if (matches && matches.length >= 2) {
                // Převod na formát pro Mapy.cz (vše na tečky)
                const lat = matches[0].replace(/[,\s]/, '.');
                const lon = matches[1].replace(/[,\s]/, '.');
                
                status.innerText = "✅ Souřadnice nalezeny!";
                const mapUrl = `https://mapy.cz/zakladni?x=${lon}&y=${lat}&z=15&source=coor&id=${lon}%2C${lat}`;
                mapBtnContainer.innerHTML = `<a href="${mapUrl}" target="_blank" class="map-link">OTEVŘÍT MAPY.CZ</a>`;
            } else {
                status.innerText = "❓ Nepodařilo se rozpoznat souřadnice";
            }
        }

        captureBtn.addEventListener('click', scanText);
        window.addEventListener('load', initCamera);
    </script>
</body>
</html>
