<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Finder v1.1.0 - MultiMap</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; margin: 0; padding: 10px; touch-action: pan-y; }
        .app-header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; padding: 0 5px; }
        .app-title { font-size: 12px; font-weight: bold; color: #ed2127; text-transform: uppercase; letter-spacing: 1px; }
        .app-version { font-size: 10px; color: #666; }

        #viewer-container { position: relative; width: 100%; max-width: 400px; border: 2px solid #ed2127; border-radius: 15px; overflow: hidden; background: #000; }
        video, #freeze-layer { width: 100%; display: block; object-fit: cover; aspect-ratio: 1/1; }
        #freeze-layer { display: none; object-fit: fill; }
        #crop-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: none; touch-action: none; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 15%; border: 2px solid #00ff00; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); z-index: 10; pointer-events: none; }
        
        .settings-box { width: 100%; max-width: 400px; margin: 10px 0; background: #222; padding: 12px; border-radius: 10px; box-sizing: border-box; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        label { font-size: 11px; color: #888; }
        
        /* Map Toggle */
        .map-toggle { display: flex; background: #000; border-radius: 8px; padding: 3px; width: 100%; margin-top: 5px; }
        .map-toggle button { flex: 1; padding: 8px; font-size: 11px; border: none; border-radius: 6px; background: transparent; color: #666; transition: 0.3s; cursor: pointer; }
        .map-toggle button.active { background: #444; color: #fff; }
        .map-toggle button.active.gmap { border-bottom: 2px solid #4285F4; }
        .map-toggle button.active.mcz { border-bottom: 2px solid #ed2127; }

        .controls { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; }
        button.main-btn { width: 100%; padding: 16px; font-size: 15px; cursor: pointer; border: none; border-radius: 10px; background: #ed2127; color: white; font-weight: bold; }
        #reset-btn { background: #555; display: none; }
        
        #result { margin-top: 10px; padding: 12px; background: #111; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; box-sizing: border-box; }
        #output-text { font-size: 15px; color: #00ff00; margin: 8px 0; font-family: monospace; word-break: break-all; background: #000; padding: 5px; }

        /* History & Distance */
        #history-list { width: 100%; max-width: 400px; margin-top: 10px; }
        .history-item { display: flex; align-items: center; background: #222; margin-top: 5px; padding: 8px 12px; border-radius: 8px; font-size: 12px; gap: 10px; }
        .history-info { flex-grow: 1; cursor: pointer; }
        .order-badge { background: #00ff00; color: #000; border-radius: 50%; width: 18px; height: 18px; display: inline-flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; margin-right: 5px; }
        
        #route-actions { width: 100%; max-width: 400px; margin-top: 15px; display: none; flex-direction: column; gap: 10px; }
        .route-btn { background: #4285F4; color: white; padding: 15px; border-radius: 10px; border: none; font-weight: bold; width: 100%; cursor: pointer; }
        #dist-display { background: #333; padding: 10px; border-radius: 8px; text-align: center; font-size: 14px; border-left: 4px solid #00ff00; }
        
        input[type="checkbox"] { transform: scale(1.4); accent-color: #00ff00; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-title">GPS Finder</div>
        <div class="app-version">v1.1.0</div>
    </div>

    <div id="viewer-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="freeze-layer"></canvas>
        <canvas id="crop-canvas"></canvas>
        <div class="overlay"></div>
    </div>

    <div class="settings-box">
        <div class="setting-row">
            <label>Zoom: <span id="zoom-val">1.5</span>x</label>
            <input type="range" id="zoom-slider" min="1" max="8" step="0.1" value="1.5" style="width:70%">
        </div>
        <label>VÝBĚR MAPY:</label>
        <div class="map-toggle">
            <button id="btn-mcz" class="active mcz" onclick="setMap('mcz')">Mapy.cz</button>
            <button id="btn-gmap" class="gmap" onclick="setMap('gmap')">Google Maps</button>
        </div>
    </div>

    <div class="controls">
        <button id="capture-btn" class="main-btn">SKENOVAT KAMEROU</button>
        <button id="reset-btn" class="main-btn">ZPĚT KE KAMERĚ</button>
    </div>

    <div id="result">
        <div id="status" style="font-size: 12px; color: #888;">PŘIPRAVENO</div>
        <div id="output-text">---</div>
    </div>

    <div id="history-list"></div>

    <div id="route-actions">
        <div id="dist-display">Vzdálenost: 0 km</div>
        <button id="gen-route-btn" class="route-btn" onclick="openRoute()">OTEVŘÍT TRASU (GOOOGLE)</button>
    </div>

    <canvas id="raw-crop-canvas" style="display:none;"></canvas>

    <script>
        let selectedMap = 'mcz';
        let history = JSON.parse(localStorage.getItem('gps_history') || '[]');
        let selectionOrder = []; // Sleduje pořadí zaškrtnutí

        const video = document.getElementById('video'), freezeLayer = document.getElementById('freeze-layer');
        const rawCropCanvas = document.getElementById('raw-crop-canvas');
        const statusDisp = document.getElementById('status'), outputText = document.getElementById('output-text');
        const routeActions = document.getElementById('route-actions');

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                renderHistory();
            } catch (err) { statusDisp.innerText = "CHYBA KAMERY"; }
        }

        function setMap(type) {
            selectedMap = type;
            document.getElementById('btn-mcz').classList.toggle('active', type === 'mcz');
            document.getElementById('btn-gmap').classList.toggle('active', type === 'gmap');
            renderHistory();
        }

        // --- OCR LOGIC ---
        document.getElementById('capture-btn').onclick = async () => {
            if (!video.videoWidth) return;
            const z = parseFloat(document.getElementById('zoom-slider').value);
            freezeLayer.width = 600; freezeLayer.height = 600;
            freezeLayer.getContext('2d').drawImage(video, 0, 0, 600, 600);
            freezeLayer.style.display = 'block'; video.style.display = 'none';
            
            const sw = (video.videoWidth / z) * 0.8, sh = (video.videoHeight / z) * 0.15;
            const sx = (video.videoWidth - sw) / 2, sy = (video.videoHeight - sh) / 2;
            rawCropCanvas.width = sw * 2; rawCropCanvas.height = sh * 2;
            rawCropCanvas.getContext('2d').drawImage(video, sx, sy, sw, sh, 0, 0, rawCropCanvas.width, rawCropCanvas.height);
            
            document.getElementById('reset-btn').style.display = 'block';
            document.getElementById('capture-btn').style.display = 'none';
            statusDisp.innerText = "⏳ ČTU...";

            const result = await Tesseract.recognize(rawCropCanvas, 'eng');
            const text = result.data.text.trim();
            outputText.innerText = text || "Nenalezeno";
            parseAndSave(text);
        };

        function parseAndSave(text) {
            const simpleRegex = /([0-9]{2,3}[.,][0-9]{3,})/g;
            const m = text.match(simpleRegex);
            if (m && m.length >= 2) {
                const lat = m[0].replace(',', '.'), lon = m[1].replace(',', '.');
                history.unshift({ lat, lon, id: Date.now() });
                localStorage.setItem('gps_history', JSON.stringify(history));
                renderHistory();
            }
        }

        // --- DISTANCE CALC (Haversine) ---
        function calculateTotalDistance(points) {
            if (points.length < 2) return 0;
            let total = 0;
            const R = 6371; // Poloměr Země v km
            for (let i = 0; i < points.length - 1; i++) {
                const dLat = (points[i+1].lat - points[i].lat) * Math.PI / 180;
                const dLon = (points[i+1].lon - points[i].lon) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                          Math.cos(points[i].lat * Math.PI / 180) * Math.cos(points[i+1].lat * Math.PI / 180) *
                          Math.sin(dLon/2) * Math.sin(dLon/2);
                total += R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            }
            return total;
        }

        function toggleSelect(id) {
            const idx = selectionOrder.indexOf(id);
            if (idx > -1) selectionOrder.splice(idx, 1);
            else selectionOrder.push(id);
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            history.forEach(h => {
                const order = selectionOrder.indexOf(h.id);
                const isSelected = order > -1;
                const item = document.createElement('div');
                item.className = 'history-item';
                
                const mapLink = selectedMap === 'gmap' 
                    ? `https://www.google.com/maps/search/?api=1&query=${h.lat},${h.lon}`
                    : `https://mapy.cz/zakladni?x=${h.lon}&y=${h.lat}&z=16&source=coor&id=${h.lon}%2C${h.lat}`;

                item.innerHTML = `
                    <input type="checkbox" ${isSelected ? 'checked' : ''} onclick="toggleSelect(${h.id})">
                    <div class="history-info" onclick="window.open('${mapLink}', '_blank')">
                        ${isSelected ? `<span class="order-badge">${order + 1}</span>` : ''}
                        <span style="color:#00ff00; font-family:monospace;">${h.lat}, ${h.lon}</span>
                    </div>
                    <span onclick="deleteItem(${h.id})" style="color:#666">🗑</span>
                `;
                list.appendChild(item);
            });

            // Update trasy a vzdálenosti
            const selectedPoints = selectionOrder.map(id => history.find(h => h.id === id));
            if (selectedPoints.length >= 2) {
                routeActions.style.display = 'flex';
                const dist = calculateTotalDistance(selectedPoints);
                document.getElementById('dist-display').innerText = `Vzdálenost: ${dist.toFixed(2)} km`;
                
                const btn = document.getElementById('gen-route-btn');
                if (selectedMap === 'gmap') {
                    btn.innerText = "OTEVŘÍT TRASU V GOOGLE MAPÁCH";
                    btn.style.background = "#4285F4";
                    btn.disabled = false;
                } else {
                    btn.innerText = "TRASU UMÍ JEN GOOGLE MAPY";
                    btn.style.background = "#333";
                    btn.disabled = true;
                }
            } else {
                routeActions.style.display = 'none';
            }
        }

        function openRoute() {
            const selectedPoints = selectionOrder.map(id => history.find(h => h.id === id));
            if (selectedPoints.length < 2) return;

            const origin = `${selectedPoints[0].lat},${selectedPoints[0].lon}`;
            const destination = `${selectedPoints[selectedPoints.length-1].lat},${selectedPoints[selectedPoints.length-1].lon}`;
            
            let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;
            
            if (selectedPoints.length > 2) {
                const waypoints = selectedPoints.slice(1, -1).map(p => `${p.lat},${p.lon}`).join('|');
                url += `&waypoints=${waypoints}`;
            }
            window.open(url, '_blank');
        }

        function deleteItem(id) {
            history = history.filter(h => h.id !== id);
            selectionOrder = selectionOrder.filter(sid => sid !== id);
            localStorage.setItem('gps_history', JSON.stringify(history));
            renderHistory();
        }

        document.getElementById('reset-btn').onclick = () => {
            video.style.display = 'block'; freezeLayer.style.display = 'none';
            document.getElementById('reset-btn').style.display = 'none';
            document.getElementById('capture-btn').style.display = 'block';
            statusDisp.innerText = "PŘIPRAVENO"; outputText.innerText = "---";
        };

        document.getElementById('zoom-slider').oninput = (e) => {
            document.getElementById('zoom-val').innerText = e.target.value;
            video.style.transform = `scale(${e.target.value})`;
        };

        window.onload = initCamera;
    </script>
</body>
</html>
