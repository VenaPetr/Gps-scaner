<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Finder v2.4 - Manual Edit</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; margin: 0; padding: 10px; touch-action: pan-y; }
        .app-header { width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; padding: 0 5px; }
        .app-title { font-size: 12px; font-weight: bold; color: #ed2127; text-transform: uppercase; letter-spacing: 1px; }
        .app-version { font-size: 10px; color: #666; }
        #viewer-container { position: relative; width: 100%; max-width: 400px; border: 2px solid #ed2127; border-radius: 15px; overflow: hidden; background: #000; }
        video, #freeze-layer { width: 100%; display: block; object-fit: cover; aspect-ratio: 1/1; }
        #freeze-layer { display: none; object-fit: fill; }
        #crop-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; display: none; touch-action: none; }
        .settings-box { width: 100%; max-width: 400px; margin: 10px 0; background: #222; padding: 10px; border-radius: 10px; box-sizing: border-box; }
        label { font-size: 11px; color: #888; display: block; margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: #ed2127; margin-bottom: 10px; }
        .controls { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 8px; }
        button { width: 100%; padding: 16px; font-size: 15px; cursor: pointer; border: none; border-radius: 10px; background: #ed2127; color: white; font-weight: bold; }
        button:disabled { background: #444 !important; color: #888 !important; cursor: not-allowed; border: 1px solid #333; }
        .secondary-btn { background: #444; }
        #reset-btn { background: #555; display: none; }
        .debug-container { margin-top: 10px; padding: 10px; background: #000; border: 1px dashed #444; border-radius: 8px; width: 100%; max-width: 400px; box-sizing: border-box; display: none; }
        #ocr-canvas { width: 100%; height: auto; image-rendering: pixelated; border: 1px solid #00ff00; }
        #result { margin-top: 10px; padding: 12px; background: #111; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #333; box-sizing: border-box; }
        
        /* Editovatelné pole */
        #output-text { font-size: 16px; color: #00ff00; margin: 8px 0; font-family: monospace; word-break: break-all; background: #000; padding: 10px; min-height: 25px; border: 1px solid #444; border-radius: 5px; outline: none; }
        #output-text:focus { border-color: #ed2127; background: #111; }
        
        #recalc-btn { background: #2e7d32; font-size: 12px; padding: 8px; margin-bottom: 10px; display: none; width: 100%; }
        
        .map-selector { display: flex; justify-content: center; gap: 15px; margin: 10px 0; padding: 8px; background: #1a1a1a; border-radius: 8px; }
        .map-selector label { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #aaa; margin-bottom: 0; font-weight: bold; }
        .map-link { display: block; padding: 14px; background: #4a90e2; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 5px; }
        #history-list { width: 100%; max-width: 400px; margin-top: 10px; }
        .history-item { display: flex; align-items: center; background: #222; margin-top: 5px; padding: 8px 12px; border-radius: 8px; font-size: 11px; gap: 10px; }
        .history-checkbox { width: 18px; height: 18px; accent-color: #ed2127; }
        #distance-tool { width: 100%; max-width: 400px; margin-top: 15px; padding: 15px; background: #1a1a1a; border-radius: 10px; box-sizing: border-box; border: 1px solid #ed212733; }
        .tool-buttons { display: flex; gap: 8px; margin-bottom: 10px; }
        .tool-buttons button { padding: 12px 8px; font-size: 12px; flex: 1; }
        #distance-result { text-align: center; font-weight: bold; color: #00ff00; font-size: 16px; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="app-title">GPS Finder v2.4</div>
        <div class="app-version">v2.4-edit</div>
    </div>

    <div id="viewer-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="freeze-layer"></canvas>
        <canvas id="crop-canvas"></canvas>
    </div>

    <div class="settings-box">
        <label>Zoom náhledu: <span id="zoom-val">1.5</span>x</label>
        <input type="range" id="zoom-slider" min="1" max="8" step="0.1" value="1.5">
        <label>Threshold (OCR): <span id="threshold-val">Auto</span></label>
        <input type="range" id="threshold-slider" min="0" max="255" step="1" value="128">
    </div>

    <div class="controls">
        <button id="camera-btn">📸 POŘÍDIT FOTO</button>
        <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;">
        <button id="file-btn" class="secondary-btn">📂 GALERIE</button>
        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <button id="reset-btn">🔄 NOVÝ SNÍMEK</button>
    </div>

    <div id="debug-box" class="debug-container">
        <canvas id="ocr-canvas"></canvas>
    </div>

    <div id="result">
        <div id="status" style="font-size: 11px; color: #888;">PŘIPRAVENO</div>
        
        <div id="output-text" contenteditable="true" spellcheck="false">---</div>
        <button id="recalc-btn">PŘEPOČÍTAT UPRAVENÝ TEXT</button>

        <div class="map-selector">
            <label><input type="radio" name="map-provider" value="mapycz" checked> Mapy.cz</label>
            <label><input type="radio" name="map-provider" value="google"> Google Maps</label>
        </div>
        <div id="map-button-container"></div>
    </div>

    <div id="history-list"></div>

    <div id="distance-tool">
        <div class="tool-buttons">
            <button id="calc-dist-btn" disabled>VZDÁLENOST</button>
            <button id="route-btn" disabled style="background:#34a853">TRASA</button>
        </div>
        <div id="distance-result">---</div>
    </div>

    <canvas id="raw-crop-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video'), freezeLayer = document.getElementById('freeze-layer'), cropCanvas = document.getElementById('crop-canvas');
        const rawCropCanvas = document.getElementById('raw-crop-canvas'), ocrCanvas = document.getElementById('ocr-canvas'), debugBox = document.getElementById('debug-box');
        const fileInput = document.getElementById('file-input'), cameraInput = document.getElementById('camera-input');
        const fileBtn = document.getElementById('file-btn'), cameraBtn = document.getElementById('camera-btn'), resetBtn = document.getElementById('reset-btn'), recalcBtn = document.getElementById('recalc-btn');
        const statusDisp = document.getElementById('status'), outputText = document.getElementById('output-text'), mapBtnContainer = document.getElementById('map-button-container');
        const calcDistBtn = document.getElementById('calc-dist-btn'), routeBtn = document.getElementById('route-btn'), distanceResult = document.getElementById('distance-result');
        const thresholdSlider = document.getElementById('threshold-slider'), thresholdVal = document.getElementById('threshold-val');

        let isFrozen = false, isDrawing = false, sourceImg = null, startX, startY, selection = { x: 0, y: 0, w: 0, h: 0 };
        let history = JSON.parse(localStorage.getItem('gps_history') || '[]');
        let lastLat = null, lastLon = null;

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
                video.srcObject = stream; applyZoom(); renderHistory();
            } catch (err) { statusDisp.innerText = "NÁHLED KAMERY NEDOSTUPNÝ"; }
        }

        function handleImageUpload(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    sourceImg = img; isFrozen = true;
                    video.style.display = 'none';
                    const aspect = img.height / img.width;
                    freezeLayer.width = cropCanvas.width = 1000;
                    freezeLayer.height = cropCanvas.height = 1000 * aspect;
                    freezeLayer.getContext('2d').drawImage(img, 0, 0, freezeLayer.width, freezeLayer.height);
                    freezeLayer.style.display = 'block'; cropCanvas.style.display = 'block';
                    resetBtn.style.display = 'block'; cameraBtn.style.display = 'none'; fileBtn.style.display = 'none';
                    statusDisp.innerText = "OZNAČTE TEXT RÁMEČKEM";
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        fileBtn.onclick = () => fileInput.click();
        cameraBtn.onclick = () => cameraInput.click();
        fileInput.onchange = handleImageUpload;
        cameraInput.onchange = handleImageUpload;

        const startDraw = (e) => { if(!isFrozen) return; isDrawing = true; const p = getMousePos(cropCanvas, e); startX = p.x; startY = p.y; };
        const doDraw = (e) => {
            if (!isDrawing) return;
            const p = getMousePos(cropCanvas, e);
            selection = { x: Math.min(startX, p.x), y: Math.min(startY, p.y), w: Math.abs(p.x - startX), h: Math.abs(p.y - startY) };
            const ctx = cropCanvas.getContext('2d');
            ctx.clearRect(0, 0, cropCanvas.width, cropCanvas.height);
            ctx.strokeStyle = '#00ff00'; ctx.lineWidth = 4;
            ctx.strokeRect(selection.x, selection.y, selection.w, selection.h);
        };
        const endDraw = () => { if (!isDrawing) return; isDrawing = false; if (selection.w > 10) runOcrOnSelection(); };

        cropCanvas.addEventListener('mousedown', startDraw);
        cropCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); }, {passive: false});
        cropCanvas.addEventListener('mousemove', doDraw);
        cropCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); doDraw(e); }, {passive: false});
        window.addEventListener('mouseup', endDraw);
        cropCanvas.addEventListener('touchend', endDraw);

        function getMousePos(canvas, evt) {
            const rect = canvas.getBoundingClientRect();
            const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
            const clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
            return { x: (clientX - rect.left) * (canvas.width / rect.width), y: (clientY - rect.top) * (canvas.height / rect.height) };
        }

        function runOcrOnSelection() {
            if (!sourceImg) return;
            const scaleX = sourceImg.width / freezeLayer.width;
            const scaleY = sourceImg.height / freezeLayer.height;
            rawCropCanvas.width = selection.w * scaleX; rawCropCanvas.height = selection.h * scaleY;
            rawCropCanvas.getContext('2d').drawImage(sourceImg, selection.x * scaleX, selection.y * scaleY, selection.w * scaleX, selection.h * scaleY, 0, 0, rawCropCanvas.width, rawCropCanvas.height);
            processImageAndOCR();
        }

        async function processImageAndOCR() {
            debugBox.style.display = 'block'; statusDisp.innerText = "⏳ ČTU...";
            const ocrCtx = ocrCanvas.getContext('2d');
            ocrCanvas.width = rawCropCanvas.width; ocrCanvas.height = rawCropCanvas.height;
            let imgData = rawCropCanvas.getContext('2d').getImageData(0, 0, rawCropCanvas.width, rawCropCanvas.height);
            let d = imgData.data, totalB = 0;
            for (let i = 0; i < d.length; i += 4) totalB += (d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11);
            let avgB = totalB / (d.length / 4);
            let thresh = (thresholdSlider.value == 128) ? avgB : thresholdSlider.value;
            for (let i = 0; i < d.length; i += 4) { let v = (d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11 > thresh) ? 255 : 0; d[i] = d[i+1] = d[i+2] = v; }
            ocrCtx.putImageData(imgData, 0, 0);

            try {
                const result = await Tesseract.recognize(ocrCanvas, 'eng', { tessedit_char_whitelist: '0123456789.,°^"\'NSEWnsewVZvz ' });
                let text = result.data.text.trim();
                
                // AUTOMATICKÁ OPRAVA SYMBOLŮ PŘED ZOBRAZENÍM
                // Nahradí ^ nebo 7 uprostřed souřadnice symbolem stupně
                text = text.replace(/(\d+)\^/g, '$1°').replace(/(\d+)7/g, '$1°');
                
                outputText.innerText = text || "Nenalezen text";
                recalcBtn.style.display = 'block'; // Zobrazit tlačítko pro opravu
                parseCoordinates(text);
            } catch (e) { statusDisp.innerText = "CHYBA OCR"; }
        }

        // Funkce vyvolaná tlačítkem "PŘEPOČÍTAT"
        recalcBtn.onclick = () => {
            const editedText = outputText.innerText;
            parseCoordinates(editedText);
        };

        function parseCoordinates(text) {
            // Regex bere v potaz i ^ nebo 7, pokud by tam zbyly
            const coordRegex = /([NSNSEWnsewVZvz]?\s*\d{1,3}[°\^7\s]+\d{1,2}[.\d]*['\s]*[\d.]*["\s]*[NSNSEWnsewVZvz]?)/gi;
            const matches = text.match(coordRegex);
            let fLat, fLon;
            if (matches && matches.length >= 2) {
                const c1 = convertToDecimal(matches[0]), c2 = convertToDecimal(matches[1]);
                if (c1.type === 'lon' || c2.type === 'lat') { fLat = c2.val; fLon = c1.val; } else { fLat = c1.val; fLon = c2.val; }
            } else {
                const simpleMatches = text.match(/([0-9]{2,3}[.,][0-9]{3,})/g);
                if (simpleMatches && simpleMatches.length >= 2) { fLat = simpleMatches[0].replace(',', '.'); fLon = simpleMatches[1].replace(',', '.'); }
            }
            if (fLat && fLon) { lastLat = fLat; lastLon = fLon; statusDisp.innerText = "✅ OK (Můžeš upravit text výše)"; updateMapButton(); } 
            else statusDisp.innerText = "❓ CHYBA FORMÁTU - OPRAV RUČNĚ";
        }

        function convertToDecimal(s) {
            s = s.replace(/[\^7]/g, '°'); // Vyčistit pro výpočet
            const n = s.match(/(\d+(\.\d+)?)/g); if (!n) return { val: null, type: 'unknown' };
            let d = parseFloat(n[0]) + (n[1]?n[1]/60:0) + (n[2]?n[2]/3600:0);
            if (/[SWswZz]/.test(s)) d = -d;
            return { val: d.toFixed(6), type: /[NSns]/.test(s) ? 'lat' : 'lon' };
        }

        function updateMapButton() {
            if (!lastLat || !lastLon) return;
            const p = document.querySelector('input[name="map-provider"]:checked').value;
            const url = p === "mapycz" ? `https://mapy.cz/zakladni?x=${lastLon}&y=${lastLat}&z=16&source=coor&id=${lastLon}%2C${lastLat}` : `https://www.google.com/maps/search/?api=1&query=${lastLat},${lastLon}`;
            mapBtnContainer.innerHTML = `<a href="${url}" target="_blank" class="map-link" onclick="saveToHistory('${lastLat}', '${lastLon}')">OTEVŘÍT MAPU</a>`;
        }

        function saveToHistory(lat, lon) {
            history = history.filter(h => h.lat !== lat || h.lon !== lon);
            history.unshift({ lat, lon }); if (history.length > 20) history.pop();
            localStorage.setItem('gps_history', JSON.stringify(history)); renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.length ? '<div style="font-size:10px; color:#666; margin:10px 0 5px 0">HISTORIE:</div>' : '';
            history.forEach((h, i) => {
                const item = document.createElement('div'); item.className = 'history-item';
                item.innerHTML = `<input type="checkbox" class="history-checkbox" data-index="${i}" onchange="toggleToolButtons()">
                    <div style="flex-grow:1"><b>${h.lat}, ${h.lon}</b></div>
                    <span style="color:#ed2127;cursor:pointer" onclick="deleteItem(${i})">🗑</span>`;
                list.appendChild(item);
            });
            toggleToolButtons();
        }

        window.deleteItem = (i) => { history.splice(i, 1); localStorage.setItem('gps_history', JSON.stringify(history)); renderHistory(); };
        function toggleToolButtons() { const c = document.querySelectorAll('.history-checkbox:checked').length >= 2; calcDistBtn.disabled = !c; routeBtn.disabled = !c; }

        calcDistBtn.onclick = () => {
            const boxes = document.querySelectorAll('.history-checkbox:checked');
            const pts = Array.from(boxes).map(cb => history[cb.dataset.index]);
            const R = 6371e3, f1 = pts[0].lat * Math.PI/180, f2 = pts[1].lat * Math.PI/180;
            const df = (pts[1].lat-pts[0].lat)*Math.PI/180, dl = (pts[1].lon-pts[0].lon)*Math.PI/180;
            const a = Math.sin(df/2)**2 + Math.cos(f1)*Math.cos(f2)*Math.sin(dl/2)**2;
            const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            distanceResult.innerText = d > 1000 ? (d/1000).toFixed(3) + " km" : Math.round(d) + " m";
        };

        routeBtn.onclick = () => {
            const pts = Array.from(document.querySelectorAll('.history-checkbox:checked')).map(cb => history[cb.dataset.index]);
            window.open(`https://www.google.com/maps/dir/${pts[0].lat},${pts[0].lon}/${pts[1].lat},${pts[1].lon}`, '_blank');
        };

        function applyZoom() {
            const v = document.getElementById('zoom-slider').value;
            document.getElementById('zoom-val').innerText = v;
            video.style.transform = `scale(${v})`;
        }

        resetBtn.onclick = () => {
            isFrozen = false; sourceImg = null;
            video.style.display = 'block'; freezeLayer.style.display = 'none'; cropCanvas.style.display = 'none';
            resetBtn.style.display = 'none'; debugBox.style.display = 'none'; recalcBtn.style.display = 'none';
            cameraBtn.style.display = 'block'; fileBtn.style.display = 'block';
            statusDisp.innerText = "PŘIPRAVENO"; outputText.innerText = "---";
            mapBtnContainer.innerHTML = "";
        };

        thresholdSlider.oninput = () => { if (isFrozen) runOcrOnSelection(); else thresholdVal.innerText = (thresholdSlider.value == 128) ? "Auto" : thresholdSlider.value; };
        document.getElementById('zoom-slider').oninput = applyZoom;
        document.querySelectorAll('input[name="map-provider"]').forEach(r => r.onchange = updateMapButton);
        window.onload = initCamera;
    </script>
</body>
</html>
