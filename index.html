<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Scanner - Live Tuning</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; margin: 0; padding: 10px; touch-action: manipulation; }
        #viewer-container { position: relative; width: 100%; max-width: 400px; aspect-ratio: 1/1; border: 2px solid #ed2127; border-radius: 15px; overflow: hidden; background: #000; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform-origin: center; }
        #freeze-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; display: none; z-index: 5; background: black; }
        .overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 15%; border: 2px solid #00ff00; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); z-index: 10; pointer-events: none; }
        
        .settings-box { width: 100%; max-width: 400px; margin: 10px 0; background: #222; padding: 10px; border-radius: 10px; box-sizing: border-box; }
        label { font-size: 11px; color: #888; display: block; margin-bottom: 5px; }
        input[type=range] { width: 100%; accent-color: #ed2127; margin-bottom: 10px; }

        .controls { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 10px; }
        button { width: 100%; padding: 18px; font-size: 16px; cursor: pointer; border: none; border-radius: 10px; background: #ed2127; color: white; font-weight: bold; }
        #reset-btn { background: #444; display: none; }

        #debug-container { margin-top: 15px; width: 100%; max-width: 400px; display: none; gap: 10px; flex-direction: column; }
        .debug-box { background: #222; border-radius: 10px; padding: 8px; border: 1px solid #444; }
        canvas.preview { width: 100%; border-radius: 4px; background: #000; }

        #result { margin-top: 15px; padding: 15px; background: #111; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; }
        #output-text { font-size: 16px; color: #00ff00; margin: 10px 0; font-family: monospace; font-weight: bold; }
        .map-link { display: block; padding: 15px; background: #4a90e2; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="viewer-container" onclick="manualFocus()">
        <video id="video" autoplay playsinline></video>
        <canvas id="freeze-layer"></canvas>
        <div class="overlay"></div>
    </div>

    <div class="settings-box">
        <label>Hardwarový Zoom: <span id="zoom-val">1.5</span>x</label>
        <input type="range" id="zoom-slider" min="1" max="8" step="0.1" value="1.5">
        
        <label>Citlivost OCR (Práh): <span id="threshold-val">Auto</span></label>
        <input type="range" id="threshold-slider" min="0" max="255" step="1" value="128">
    </div>

    <div class="controls">
        <button id="capture-btn">SKENOVAT TEXT</button>
        <button id="reset-btn">ZRUŠIT A ZNOVU</button>
        
        <div id="debug-container">
            <div class="debug-box">
                <label>Vstup pro OCR (upravte sliderem):</label>
                <canvas id="debug-bin-canvas" class="preview"></canvas>
            </div>
        </div>
    </div>

    <div id="result">
        <div id="status">Klepnutím na video zaostříte</div>
        <div id="output-text"></div>
        <div id="map-button-container"></div>
    </div>

    <canvas id="raw-crop-canvas" style="display:none;"></canvas>
    <canvas id="ocr-canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const freezeLayer = document.getElementById('freeze-layer');
        const ocrCanvas = document.getElementById('ocr-canvas');
        const rawCropCanvas = document.getElementById('raw-crop-canvas');
        const debugBinCanvas = document.getElementById('debug-bin-canvas');
        const debugContainer = document.getElementById('debug-container');
        const captureBtn = document.getElementById('capture-btn');
        const resetBtn = document.getElementById('reset-btn');
        const status = document.getElementById('status');
        const outputText = document.getElementById('output-text');
        const mapBtnContainer = document.getElementById('map-button-container');
        const zoomSlider = document.getElementById('zoom-slider');
        const zoomVal = document.getElementById('zoom-val');
        const thresholdSlider = document.getElementById('threshold-slider');
        const thresholdVal = document.getElementById('threshold-val');

        let videoTrack = null;
        let isFrozen = false;

        async function manualFocus() {
            if (!videoTrack || isFrozen) return;
            const capabilities = videoTrack.getCapabilities();
            if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
                try {
                    status.innerText = "🎯 Ostřím...";
                    await videoTrack.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
                    setTimeout(() => { if(!isFrozen) status.innerText = "Připraveno ke skenování"; }, 1500);
                } catch (e) { console.error(e); }
            }
        }

        zoomSlider.oninput = async () => {
            const val = zoomSlider.value;
            zoomVal.innerText = val;
            video.style.transform = `scale(${val})`;
            if (videoTrack && videoTrack.getCapabilities().zoom) {
                try { await videoTrack.applyConstraints({ advanced: [{ zoom: val }] }); } catch (e) {}
            }
        };

        // HLAVNÍ ZMĚNA: Reakce slideru po zafreezování
        thresholdSlider.oninput = () => {
            thresholdVal.innerText = thresholdSlider.value;
            if (isFrozen) {
                processImageAndOCR(); // Přepočítat okamžitě při pohybu sliderem
            }
        };

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
                });
                video.srcObject = stream;
                videoTrack = stream.getVideoTracks()[0];
                setTimeout(() => zoomSlider.oninput(), 1000);
            } catch (err) { status.innerText = "Chyba kamery."; }
        }

        async function scanText() {
            if (!video.videoWidth) return;
            isFrozen = true;

            const z = parseFloat(zoomSlider.value);
            const vw = video.videoWidth;
            const vh = video.videoHeight;

            // 1. Zmrazit náhled
            const fCtx = freezeLayer.getContext('2d');
            freezeLayer.width = video.clientWidth;
            freezeLayer.height = video.clientHeight;
            fCtx.drawImage(video, 0, 0, freezeLayer.width, freezeLayer.height);
            freezeLayer.style.display = 'block';
            video.style.visibility = 'hidden';
            
            captureBtn.disabled = true;
            resetBtn.style.display = 'block';
            debugContainer.style.display = 'flex';

            // 2. Uložit ČISTÝ výřez do skrytého plátna (rawCropCanvas)
            const sw = (vw / z) * 0.8;
            const sh = (vh / z) * 0.15;
            const sx = (vw - sw) / 2;
            const sy = (vh - sh) / 2;

            rawCropCanvas.width = sw * 2;
            rawCropCanvas.height = sh * 2;
            const rCtx = rawCropCanvas.getContext('2d');
            rCtx.drawImage(video, sx, sy, sw, sh, 0, 0, rawCropCanvas.width, rawCropCanvas.height);

            // 3. Spustit zpracování
            processImageAndOCR();
        }

        async function processImageAndOCR() {
            status.innerText = "⏳ Zpracovávám...";
            
            const rawCtx = rawCropCanvas.getContext('2d');
            const ocrCtx = ocrCanvas.getContext('2d');
            ocrCanvas.width = rawCropCanvas.width;
            ocrCanvas.height = rawCropCanvas.height;

            // Získat data z čistého výřezu
            let imgData = rawCtx.getImageData(0, 0, rawCropCanvas.width, rawCropCanvas.height);
            let d = imgData.data;
            
            // Výpočet prahu
            let totalBrightness = 0;
            for (let i = 0; i < d.length; i += 4) {
                totalBrightness += (d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11);
            }
            let autoThreshold = totalBrightness / (d.length / 4);
            let finalThreshold = (thresholdSlider.value == 128) ? autoThreshold : thresholdSlider.value;
            if(thresholdSlider.value == 128) thresholdVal.innerText = "Auto (" + Math.round(autoThreshold) + ")";

            // Binarizace
            for (let i = 0; i < d.length; i += 4) {
                let gray = d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11;
                let v = (gray > finalThreshold) ? 255 : 0; 
                d[i] = d[i+1] = d[i+2] = v;
            }
            ocrCtx.putImageData(imgData, 0, 0);

            // Debug náhled
            debugBinCanvas.width = ocrCanvas.width;
            debugBinCanvas.height = ocrCanvas.height;
            debugBinCanvas.getContext('2d').putImageData(imgData, 0, 0);

            // OCR Samotné
            try {
                const { data: { text } } = await Tesseract.recognize(ocrCanvas, 'eng', {
                    tessedit_char_whitelist: '0123456789., '
                });
                outputText.innerText = text.trim();
                findCoordinates(text);
            } catch (e) { status.innerText = "Chyba OCR."; }
        }

        function findCoordinates(text) {
            const regex = /([0-9]{2}[.,\s][0-9]{3,})/g;
            const matches = text.match(regex);
            if (matches && matches.length >= 2) {
                const lat = matches[0].replace(/[,\s]/, '.');
                const lon = matches[1].replace(/[,\s]/, '.');
                status.innerText = "✅ NALEZENO";
                mapBtnContainer.innerHTML = `<a href="https://mapy.cz/zakladni?x=${lon}&y=${lat}&z=15&source=coor&id=${lon}%2C${lat}" target="_blank" class="map-link">OTEVŘÍT MAPY.CZ</a>`;
            } else { status.innerText = "❓ Souřadnice nenalezeny"; mapBtnContainer.innerHTML = ""; }
        }

        resetBtn.onclick = () => {
            isFrozen = false;
            freezeLayer.style.display = 'none';
            video.style.visibility = 'visible';
            debugContainer.style.display = 'none';
            resetBtn.style.display = 'none';
            captureBtn.disabled = false;
            status.innerText = "Klepnutím na video zaostříte";
            mapBtnContainer.innerHTML = "";
            outputText.innerText = "";
        };

        captureBtn.onclick = scanText;
        window.onload = initCamera;
    </script>
</body>
</html>
